<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ERP Finanças MS Informática</title>
  <link rel="manifest" href="./manifest.json">
  
  <style>
    :root {
      --win-bg: #f3f3f3; --win-card: rgba(255, 255, 255, 0.7); --win-text: #1a1a1a;
      --win-border: #e5e5e5; --win-accent: #0078d4; --win-secondary: #5d5d5d;
      --glass: blur(15px); --green: #0f7b0f; --yellow: #9d5d00; --purple: #744da9; --red: #c42b1c;
    }

    [data-theme="dark"] {
      --win-bg: #1c1c1c; --win-card: rgba(45, 45, 45, 0.7); --win-text: #ffffff;
      --win-border: #3c3c3c; --win-accent: #4cc2ff; --win-secondary: #a1a1a1;
      --green: #6ccb5f; --yellow: #ffb900; --purple: #b69dfc; --red: #ff99a4;
    }

    * { box-sizing: border-box; font-family: "Segoe UI Variable", "Segoe UI", sans-serif; transition: background 0.2s, color 0.2s; }
    body { margin: 0; background: var(--win-bg); color: var(--win-text); min-height: 100vh; overflow-x: hidden; }

    #btn-instalar, #alerta-backup { display: none; width: 100%; padding: 14px; border: none; font-weight: 700; text-align: center; cursor: pointer; z-index: 1001; }
    #btn-instalar { background: var(--win-accent); color: white; }
    #alerta-backup { background: var(--red); color: white; animation: pulse 2s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

    .container { width: 100%; padding: 15px; max-width: 800px; margin: 0 auto; padding-bottom: 80px; }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    
    .tab-bar { display: flex; background: var(--win-card); backdrop-filter: var(--glass); border: 1px solid var(--win-border); border-radius: 12px; padding: 4px; margin-bottom: 20px; position: sticky; top: 10px; z-index: 100; }
    .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; color: var(--win-secondary); font-size: 0.75rem; font-weight: 600; border-radius: 8px; cursor: pointer; }
    .tab-btn.active { background: var(--win-bg); color: var(--win-accent); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

    .cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .card { background: var(--win-card); backdrop-filter: var(--glass); padding: 15px; border-radius: 12px; border: 1px solid var(--win-border); }
    .card h2 { margin: 0; font-size: 0.65rem; color: var(--win-secondary); text-transform: uppercase; }
    .card p { margin: 8px 0 0; font-size: 1rem; font-weight: 700; }

    .secao { background: var(--win-card); padding: 18px; border-radius: 12px; border: 1px solid var(--win-border); margin-bottom: 15px; }
    .secao h3 { margin: 0 0 15px; font-size: 0.85rem; color: var(--win-accent); border-bottom: 1px solid var(--win-border); padding-bottom: 8px; }

    .linha-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid var(--win-border); gap: 10px; }
    .info-area { display: flex; flex: 1; align-items: center; justify-content: space-between; }
    
    input, select { background: var(--win-bg); border: 1px solid var(--win-border); color: var(--win-text); padding: 8px; border-radius: 6px; }
    .input-valor { width: 90px; text-align: right; font-weight: 700; }
    .btn-del { background: var(--red); color: white; border: none; border-radius: 6px; width: 30px; height: 30px; font-weight: bold; }

    .grafico-barra { width: 100%; height: 20px; background: var(--win-border); border-radius: 10px; overflow: hidden; margin: 8px 0 15px; display: flex; }
    .progresso { height: 100%; transition: width 0.5s ease; }

    .theme-toggle { position: fixed; bottom: 20px; left: 20px; width: 50px; height: 50px; border-radius: 25px; background: var(--win-accent); color: white; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 1000; font-size: 1.2rem; }

    #modal-pagamento { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
    .modal-content { background: var(--win-bg); padding: 25px; border-radius: 15px; width: 100%; max-width: 350px; text-align: center; border: 1px solid var(--win-accent); }
    
    .tab-content { display: none; }
    .tab-content.active { display: block; animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body data-theme="dark">

  <button id="btn-instalar" onclick="dispararInstalacao()">📲 INSTALAR NO TABLET</button>
  <button id="alerta-backup" onclick="exportarJSON()">⚠️ BACKUP PENDENTE (SALVAR AGORA)</button>
  <button class="theme-toggle" onclick="toggleTheme()">🌓</button>

  <div class="container">
    <header>
      <h1 style="color: var(--win-accent);">💻 MS FINANÇAS</h1>
      <select id="mes_select" onchange="renderizar();"></select>
    </header>

    <nav class="tab-bar">
      <button class="tab-btn active" onclick="mudarAba('resumo')">RESUMO</button>
      <button class="tab-btn" onclick="mudarAba('receitas')">RECEITAS</button>
      <button class="tab-btn" onclick="mudarAba('despesas')">DESPESAS</button>
      <button class="tab-btn" onclick="mudarAba('dashboard')">DADOS</button>
    </nav>

    <main id="aba-resumo" class="tab-content active">
      <div class="cards-grid">
        <div class="card"><h2>Bruta</h2><p id="res-bruta">R$ 0,00</p></div>
        <div class="card"><h2>Extra Livre</h2><p id="res-extra" style="color:var(--purple)">R$ 0,00</p></div>
        <div class="card"><h2>Adiant.</h2><p id="res-adiant">R$ 0,00</p></div>
        <div class="card"><h2>Salário</h2><p id="res-salario" style="color:var(--green)">R$ 0,00</p></div>
      </div>
      
      <div class="card" style="width: 100%; margin-bottom: 15px;">
        <div style="display:flex; justify-content: space-between;">
          <h2>Cartão de Crédito</h2>
          <span id="res-gasto-cartao" style="font-size: 0.65rem; color: var(--yellow);">Gasto: R$ 0,00</span>
        </div>
        <p id="res-fatura" style="font-size: 1.2rem; margin-top: 5px;">R$ 0,00</p>
      </div>

      <div class="secao">
        <h3>Ajuste de Limite</h3>
        <input type="number" id="input-limite" class="input-valor" style="width: 100%;" onchange="dados.config.limiteCartao = parseFloat(this.value) || 0; salvar();">
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <button onclick="exportarJSON()" style="padding:15px; border-radius:8px; border:none; background:var(--win-accent); color:white; font-weight:700;">📤 Backup</button>
        <button onclick="document.getElementById('input-import').click()" style="padding:15px; border-radius:8px; border:none; background:var(--win-secondary); color:white;">📥 Restaurar</button>
        <input type="file" id="input-import" style="display: none;" onchange="importarJSON(event)">
      </div>
    </main>

    <main id="aba-receitas" class="tab-content">
      <div class="secao">
        <h3>Entradas Mensais</h3>
        <div id="lista-receitas"></div>
        <button onclick="addReceita()" style="width:100%; padding:12px; background:var(--green); color:white; border:none; border-radius:8px; margin-top:10px; font-weight:700;">+ Nova Receita</button>
      </div>
      <div class="secao">
        <h3>Pagamento de Fatura</h3>
        <div id="lista-antecipacoes"></div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px;">
          <input type="date" id="ant-data">
          <input type="number" id="ant-valor" placeholder="R$" class="input-valor" style="width:100%">
        </div>
        <button onclick="registrarPagamentoFatura()" style="width:100%; margin-top:5px; padding:10px; background:var(--win-accent); color:white; border:none; border-radius:8px;">Confirmar Pagamento</button>
      </div>
    </main>

    <main id="aba-despesas" class="tab-content">
      <div class="secao">
        <h3>Contas Fixas</h3>
        <div id="lista-fixas"></div>
        <button onclick="addDespesaFixa()" style="width:100%; padding:12px; background:var(--purple); color:white; border:none; border-radius:8px; margin-top:10px; font-weight:700;">+ Nova Conta Fixa</button>
      </div>
      <div class="secao">
        <h3>Despesas Avulsas</h3>
        <div id="lista-diversas"></div>
        <div style="background: rgba(0,0,0,0.05); padding:10px; border-radius:8px; margin-top:10px;">
          <input type="text" id="var-desc" placeholder="O que comprou?" style="width:100%; margin-bottom:5px;">
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap:5px; margin-bottom:5px;">
            <input type="date" id="var-data">
            <input type="number" id="var-valor" placeholder="R$" class="input-valor" style="width:100%">
          </div>
          <div style="display: flex; gap:5px;">
            <select id="var-meio" style="flex:1">
              <option value="debito">💰 Débito</option>
              <option value="credito">💳 Crédito</option>
              <option value="extra">✨ Extra</option>
            </select>
            <button onclick="addVariavel()" style="flex:1; background:var(--win-accent); color:white; border:none; border-radius:8px; font-weight:700;">Salvar</button>
          </div>
        </div>
      </div>
    </main>

    <main id="aba-dashboard" class="tab-content">
      <div class="secao">
        <h3>Estatística de Gastos</h3>
        <div style="margin-top:15px;">
          <span>💰 Débito: <b id="pct-debito">0%</b></span>
          <div class="grafico-barra"><div id="bar-debito" class="progresso" style="background:var(--win-accent);"></div></div>
          <span>💳 Cartão: <b id="pct-credito">0%</b></span>
          <div class="grafico-barra"><div id="bar-credito" class="progresso" style="background:var(--yellow);"></div></div>
          <span>✨ Extra: <b id="pct-extra">0%</b></span>
          <div class="grafico-barra"><div id="bar-extra" class="progresso" style="background:var(--purple);"></div></div>
        </div>
      </div>
    </main>
  </div>

  <div id="modal-pagamento"><div class="modal-content">
    <h3 id="modal-item-nome">Pagar com...</h3>
    <div style="display:grid; gap:10px; margin-top:20px;">
      <button onclick="processarEscolhaFixa('debito')" style="padding:15px; background:var(--green); color:white; border:none; border-radius:8px; font-weight:700;">💰 DÉBITO</button>
      <button onclick="processarEscolhaFixa('credito')" style="padding:15px; background:var(--yellow); color:white; border:none; border-radius:8px; font-weight:700;">💳 CARTÃO</button>
      <button onclick="processarEscolhaFixa('extra')" style="padding:15px; background:var(--purple); color:white; border:none; border-radius:8px; font-weight:700;">✨ EXTRA</button>
    </div>
    <button onclick="fecharModal()" style="margin-top:15px; background:transparent; border:none; color:var(--red);">Cancelar</button>
  </div></div>

  <script>
    const STORAGE_KEY = "Financas_Marcus_v3_1";
    let dados = JSON.parse(localStorage.getItem(STORAGE_KEY)) || inicializar();
    let itemSelecionadoIdx = null;

    function inicializar() {
      const base = { config: { limiteCartao: 2000.00, ultimoBackup: new Date().toISOString() } };
      for (let m = 1; m <= 12; m++) {
        base[`2026-${String(m).padStart(2, '0')}`] = { receitas: [{desc: "Adiantamento", valor: 0}, {desc: "Salário", valor: 0}], fixas: [], variaveis: [], pagamentosFatura: [] };
      }
      return base;
    }

    function salvar() { localStorage.setItem(STORAGE_KEY, JSON.stringify(dados)); renderizar(); verificarBackup(); }
    function formatar(v) { return Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }

    function renderizar() {
      const mes = document.getElementById("mes_select").value;
      const info = dados[mes];
      document.getElementById("input-limite").value = dados.config.limiteCartao;

      // Render Listas
      document.getElementById("lista-receitas").innerHTML = info.receitas.map((r, i) => `
        <div class="linha-item"><span class="info-area"><b>${r.desc}</b></span>
        <input type="number" step="0.01" class="input-valor" value="${parseFloat(r.valor||0).toFixed(2)}" onchange="dados['${mes}'].receitas[${i}].valor=parseFloat(this.value)||0;salvar()">
        <button onclick="removerItem('receitas', ${i})" class="btn-del">×</button></div>`).join('');

      document.getElementById("lista-fixas").innerHTML = info.fixas.map((f, i) => `
        <div class="linha-item" style="${f.paga ? 'opacity:0.5' : ''}">
          <input type="checkbox" ${f.paga ? 'checked' : ''} onchange="abrirModalPagamento(${i}, this.checked)" style="width:20px; height:20px;">
          <div class="info-area"><span>${f.categoria}</span><b>${formatar(f.valor)}</b></div>
          <button onclick="removerItem('fixas', ${i})" class="btn-del">×</button></div>`).join('');

      document.getElementById("lista-diversas").innerHTML = info.variaveis.map((v, i) => `
        <div class="linha-item"><div class="info-area"><span>${v.descricao}</span><b>${formatar(v.valor)}</b></div>
        <button onclick="removerItem('variaveis', ${i})" class="btn-del">×</button></div>`).join('');

      document.getElementById("lista-antecipacoes").innerHTML = (info.pagamentosFatura||[]).map((p, i) => `
        <div class="linha-item"><span>Pago em ${p.data.split('-')[2]}</span><b>${formatar(p.valor)}</b>
        <button onclick="removerPagamentoFatura(${i})" class="btn-del">×</button></div>`).join('');

      atualizarResumo();
      atualizarDashboard();
    }

    function atualizarResumo() {
      const mes = document.getElementById("mes_select").value;
      const info = dados[mes];
      let bruta=0, vExtra=0, vAdiant=0, vSal=0, pExtra=0, pAdiant=0, pSal=0, gCartao=0, pFat=0;

      info.receitas.forEach(r => { 
        const v = parseFloat(r.valor||0); bruta += v;
        const n = r.desc.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
        if (n.includes("adiant")) vAdiant += v; else if (n.includes("salario")) vSal += v; else vExtra += v;
      });

      [...info.fixas, ...info.variaveis].forEach(it => {
        const v = parseFloat(it.valor||0);
        if(it.meio==='credito') gCartao += v;
        else if(it.meio==='extra') pExtra += v;
        else if(it.paga || it.meio==='debito') {
            const dia = parseInt(it.data?.split('-')[2] || 10);
            if(dia <= 15) pAdiant += v; else pSal += v;
        }
      });

      (info.pagamentosFatura||[]).forEach(p => { 
          const v = parseFloat(p.valor||0); pFat += v;
          if(parseInt(p.data.split('-')[2]) <= 15) pAdiant += v; else pSal += v;
      });

      document.getElementById("res-bruta").innerText = formatar(bruta);
      document.getElementById("res-extra").innerText = formatar(vExtra - pExtra);
      document.getElementById("res-adiant").innerText = formatar(vAdiant - pAdiant);
      document.getElementById("res-salario").innerText = formatar(vSal - pSal);
      const real = gCartao - pFat;
      document.getElementById("res-fatura").innerText = formatar(dados.config.limiteCartao - real);
      document.getElementById("res-gasto-cartao").innerText = `Gasto: ${formatar(real)}`;
    }

    function atualizarDashboard() {
      const mes = document.getElementById("mes_select").value;
      const info = dados[mes];
      let tDeb=0, tCred=0, tExt=0;
      [...info.fixas, ...info.variaveis].forEach(i => {
        const v = parseFloat(i.valor||0);
        if(i.meio==='credito') tCred += v; else if(i.meio==='extra') tExt += v; else if(i.paga) tDeb += v;
      });
      const total = tDeb + tCred + tExt || 1;
      const pct = (v) => Math.round((v/total)*100);
      document.getElementById("bar-debito").style.width = pct(tDeb) + "%";
      document.getElementById("pct-debito").innerText = pct(tDeb) + "%";
      document.getElementById("bar-credito").style.width = pct(tCred) + "%";
      document.getElementById("pct-credito").innerText = pct(tCred) + "%";
      document.getElementById("bar-extra").style.width = pct(tExt) + "%";
      document.getElementById("pct-extra").innerText = pct(tExt) + "%";
    }

    // Ações
    function addReceita() { const n = prompt("Nome:"); if(n){ const v = parseFloat(prompt("Valor:").replace(',','.'))||0; dados[document.getElementById("mes_select").value].receitas.push({desc:n, valor:v}); salvar(); } }
    function addDespesaFixa() { const n = prompt("Conta:"); if(n){ const v = parseFloat(prompt("Valor:").replace(',','.'))||0; dados[document.getElementById("mes_select").value].fixas.push({categoria:n, valor:v, paga:false}); salvar(); } }
    function addVariavel() {
        const mes = document.getElementById("mes_select").value, d = document.getElementById("var-data").value, desc = document.getElementById("var-desc").value, vRaw = document.getElementById("var-valor").value, m = document.getElementById("var-meio").value;
        if(!d || !vRaw) return alert("Preencha data e valor");
        dados[mes].variaveis.push({data:d, descricao:desc||"Diversos", valor:parseFloat(vRaw.replace(',','.'))||0, meio:m});
        document.getElementById("var-desc").value = ""; document.getElementById("var-valor").value = ""; salvar();
    }
    function registrarPagamentoFatura() {
        const mes = document.getElementById("mes_select").value, d = document.getElementById("ant-data").value, v = document.getElementById("ant-valor").value;
        if(!d || !v) return;
        if(!dados[mes].pagamentosFatura) dados[mes].pagamentosFatura = [];
        dados[mes].pagamentosFatura.push({data:d, valor:parseFloat(v.replace(',','.'))||0}); salvar();
    }

    function abrirModalPagamento(idx, check) {
      if(!check) { dados[document.getElementById("mes_select").value].fixas[idx].paga = false; salvar(); return; }
      itemSelecionadoIdx = idx; document.getElementById("modal-pagamento").style.display = "flex";
    }
    function processarEscolhaFixa(m) {
      const mes = document.getElementById("mes_select").value;
      const it = dados[mes].fixas[itemSelecionadoIdx];
      it.meio = m; it.paga = true; it.data = `${mes}-${String(new Date().getDate()).padStart(2,'0')}`;
      fecharModal(); salvar();
    }
    function fecharModal() { document.getElementById("modal-pagamento").style.display = "none"; renderizar(); }
    function removerItem(t, i) { if(confirm("Excluir?")){ dados[document.getElementById("mes_select").value][t].splice(i,1); salvar(); } }
    function removerPagamentoFatura(i) { if(confirm("Excluir?")){ dados[document.getElementById("mes_select").value].pagamentosFatura.splice(i,1); salvar(); } }

    function toggleTheme() {
      const b = document.body; const n = b.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      b.setAttribute('data-theme', n); localStorage.setItem('theme', n);
    }
    
    function mudarAba(aba) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      event.currentTarget.classList.add('active');
      document.getElementById(`aba-${aba}`).classList.add('active');
    }

    function exportarJSON() {
      dados.config.ultimoBackup = new Date().toISOString();
      const b = new Blob([JSON.stringify(dados)], {type:'application/json'});
      const a = document.createElement('a'); a.href=URL.createObjectURL(b); a.download=`Backup_Financas.json`; a.click();
      salvar();
    }
    function importarJSON(e) {
      const r = new FileReader(); r.onload = (v) => { try { dados = JSON.parse(v.target.result); salvar(); } catch(e){ alert("Erro!"); } };
      r.readAsText(e.target.files[0]);
    }
    function verificarBackup() {
      const u = new Date(dados.config.ultimoBackup || 0);
      document.getElementById("alerta-backup").style.display = (new Date() - u) / 86400000 > 7 ? "block" : "none";
    }

    function popularMeses() {
      const s = document.getElementById("mes_select"), ms = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
      const atual = new Date().getMonth() + 1;
      ms.forEach((m, i) => {
        let o = document.createElement("option"); o.value = `2026-${String(i+1).padStart(2,'0')}`; o.textContent = m;
        if(i+1 === atual) o.selected = true; s.appendChild(o);
      });
    }

    // PWA Boot
    let defPrompt; window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); defPrompt = e; document.getElementById('btn-instalar').style.display='block'; });
    async function dispararInstalacao() { if(defPrompt) { defPrompt.prompt(); document.getElementById('btn-instalar').style.display='none'; } }
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');

    document.body.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');
    popularMeses(); renderizar(); verificarBackup();
  </script>
</body>
</html>
