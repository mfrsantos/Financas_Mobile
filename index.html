<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>MS Finanças</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="theme-color" content="#0078d4">
  
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <style>
    :root { --blue: #0078d4; --green: #107c10; --yellow: #ffb900; --orange: #d83b01; --red: #d13438; --bg: #1c1c1c; --card-bg: #2b2b2b; --border: #3c3c3c; }
    * { box-sizing: border-box; font-family: "Segoe UI", sans-serif; }
    body { margin: 0; background: var(--bg); color: #fff; }
    
    #tela-login { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    .login-box { background: var(--card-bg); padding: 30px; border-radius: 20px; width: 100%; max-width: 350px; border: 1px solid var(--blue); text-align: center; }
    .login-box input { width: 100%; padding: 12px; margin: 8px 0; background: #1a1a1a; border: 1px solid var(--border); color: white; border-radius: 8px; }
    .btn-group { display: flex; gap: 10px; margin-top: 15px; }

    #app-content { display: none; padding: 10px; max-width: 800px; margin: 0 auto; padding-bottom: 80px; }
    
    .tab-bar { display: flex; background: #252525; border-radius: 12px; padding: 4px; margin-bottom: 15px; border: 1px solid var(--border); }
    .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; color: #a1a1a1; font-weight: 700; border-radius: 8px; font-size: 0.7rem; }
    .tab-btn.active { background: #323232; color: var(--blue); }

    .cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .card { padding: 12px; border-radius: 12px; background: var(--card-bg); border: 1px solid var(--border); position: relative; overflow: hidden; display: flex; flex-direction: column; }
    
    /* Estilo dos Ícones nos Cards */
    .card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    .card-icon { font-size: 1.1rem; }
    .card h2 { margin: 0; font-size: 0.6rem; color: #b0b0b0; text-transform: uppercase; letter-spacing: 0.5px; }
    
    .card p { margin: 5px 0 10px 0; font-size: 0.95rem; font-weight: 800; z-index: 2; }
    
    .barra-bg { position: absolute; bottom: 0; left: 0; width: 100%; height: 5px; background: #333; }
    .barra-fill { height: 100%; width: 0%; transition: width 0.8s ease, background-color 0.5s ease; }

    .secao { background: var(--card-bg); padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid var(--border); }
    .linha-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #383838; gap: 10px; }
    .info-area { display: flex; flex: 1; justify-content: space-between; font-size: 0.85rem; align-items: center; }
    
    .btn-action { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 800; color: white; cursor: pointer; }
    .btn-del { background: var(--red); color: white; border: none; border-radius: 6px; width: 28px; height: 28px; }
    
    select, input[type="number"] { background: #1a1a1a; color: white; border: 1px solid var(--border); padding: 8px; border-radius: 6px; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .pago-texto { text-decoration: line-through; color: #888; }
  </style>
</head>
<body>

  <div id="tela-login">
    <div class="login-box">
      <h2 style="color:var(--blue); margin-bottom: 20px;">MS FINANÇAS</h2>
      <input type="email" id="login-email" placeholder="E-mail">
      <input type="password" id="login-senha" placeholder="Senha">
      <div class="btn-group">
        <button class="btn-action" style="background:var(--blue)" onclick="autenticar('login')">ENTRAR</button>
        <button class="btn-action" style="background:#444" onclick="autenticar('cadastro')">CADASTRAR</button>
      </div>
    </div>
  </div>

  <div id="app-content">
    <header style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 5px;">
      <span style="color:var(--blue); font-weight:800;">MS FINANÇAS</span>
      <button onclick="auth.signOut()" style="background:none; border:none; color:var(--red); font-weight:bold; font-size: 0.8rem;">Sair</button>
    </header>

    <select id="mes_select" onchange="renderizar();" style="width:100%; margin-bottom:15px;"></select>

    <nav class="tab-bar">
      <button class="tab-btn active" onclick="mudarAba(event, 'resumo')">RESUMO</button>
      <button class="tab-btn" onclick="mudarAba(event, 'receitas')">RECEITAS</button>
      <button class="tab-btn" onclick="mudarAba(event, 'despesas')">DESPESAS</button>
      <button class="tab-btn" onclick="mudarAba(event, 'cartao')">CARTÃO</button>
    </nav>

    <main id="aba-resumo" class="tab-content active">
      <div class="cards-grid">
        <div class="card">
          <div class="card-header">
            <span class="card-icon">💎</span>
            <h2>Saldo Extra</h2>
          </div>
          <p id="res-extra">R$ 0,00</p>
          <div class="barra-bg"><div id="bar-extra" class="barra-fill"></div></div>
        </div>
        
        <div class="card">
          <div class="card-header">
            <span class="card-icon">📅</span>
            <h2>Adiantamento</h2>
          </div>
          <p id="res-adiant">R$ 0,00</p>
          <div class="barra-bg"><div id="bar-adiant" class="barra-fill"></div></div>
        </div>

        <div class="card">
          <div class="card-header">
            <span class="card-icon">💰</span>
            <h2>Salário Final</h2>
          </div>
          <p id="res-salario">R$ 0,00</p>
          <div class="barra-bg"><div id="bar-salario" class="barra-fill"></div></div>
        </div>

        <div class="card">
          <div class="card-header">
            <span class="card-icon">💳</span>
            <h2>Uso do Cartão</h2>
          </div>
          <p id="res-cartao-info">R$ 0,00</p>
          <div class="barra-bg"><div id="bar-cartao" class="barra-fill"></div></div>
        </div>
      </div>
    </main>

    <main id="aba-receitas" class="tab-content">
      <div class="secao">
        <div id="lista-receitas"></div>
        <button onclick="addReceita()" class="btn-action" style="background:var(--green)">+ Adicionar Receita</button>
      </div>
    </main>

    <main id="aba-despesas" class="tab-content">
      <div class="secao">
        <h3>Contas Fixas</h3>
        <div id="lista-fixas"></div>
        <button onclick="addItem('fixas')" class="btn-action" style="background:var(--purple)">+ Nova Conta Fixa</button>
      </div>
      <div class="secao">
        <h3>Despesas Variáveis</h3>
        <div id="lista-variaveis"></div>
        <button onclick="addItem('variaveis')" class="btn-action" style="background:var(--yellow); color:#000">+ Nova Variável</button>
      </div>
    </main>

    <main id="aba-cartao" class="tab-content">
      <div class="secao">
        <h3>Pagamento de Fatura</h3>
        <div id="lista-pagamentos"></div>
        <button onclick="pagarFatura()" class="btn-action" style="background:var(--blue)">+ Registrar Pagamento</button>
      </div>
    </main>
  </div>

  <script>
    // Configurações e Lógica Firebase (Mesma da v3.8)
    const firebaseConfig = {
      apiKey: "AIzaSyBXOEwaB-i7hNRe_ezn1mW9G8p7bL6v8K0",
      authDomain: "ms-financas.firebaseapp.com",
      projectId: "ms-financas",
      storageBucket: "ms-financas.firebasestorage.app",
      messagingSenderId: "825396392769",
      appId: "1:825396392769:web:0a67fd59dc6bd18391e7c0"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    let dados = {};

    async function autenticar(tipo) {
      const email = document.getElementById('login-email').value;
      const senha = document.getElementById('login-senha').value;
      try {
        if(tipo === 'login') await auth.signInWithEmailAndPassword(email, senha);
        else { await auth.createUserWithEmailAndPassword(email, senha); alert("Conta criada!"); }
      } catch (e) { alert("Erro na autenticação."); }
    }

    auth.onAuthStateChanged(user => {
      if (user) {
        document.getElementById('tela-login').style.display = 'none';
        document.getElementById('app-content').style.display = 'block';
        carregarDados(user.uid);
      } else {
        document.getElementById('tela-login').style.display = 'flex';
        document.getElementById('app-content').style.display = 'none';
      }
    });

    async function carregarDados(uid) {
      const doc = await db.collection("usuarios").doc(uid).get();
      dados = doc.exists ? doc.data() : inicializar();
      popularMeses();
      renderizar();
    }

    async function salvar() {
      const user = auth.currentUser;
      if (user) {
        await db.collection("usuarios").doc(user.uid).set(dados);
        renderizar();
      }
    }

    function inicializar() {
      const base = { config: { limiteCartao: 2000.00 } };
      for (let m = 1; m <= 12; m++) {
        base[`2026-${String(m).padStart(2, '0')}`] = { receitas: [{desc: "Adiantamento", valor: 0}, {desc: "Salário", valor: 0}], fixas: [], variaveis: [], pagamentosFatura: [] };
      }
      return base;
    }

    function capitalizar(t) { return t.charAt(0).toUpperCase() + t.slice(1); }
    function formatar(v) { return Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL', minimumFractionDigits: 2 }); }

    function renderizar() {
      const mes = document.getElementById("mes_select").value || "2026-03";
      const info = dados[mes];

      document.getElementById("lista-receitas").innerHTML = info.receitas.map((r, i) => `
        <div class="linha-item"><span class="info-area"><b>${r.desc}</b></span>
        <input type="number" step="0.01" style="width:100px" value="${r.valor.toFixed(2)}" onchange="dados['${mes}'].receitas[${i}].valor=parseFloat(this.value);salvar()">
        </div>`).join('');

      document.getElementById("lista-fixas").innerHTML = info.fixas.map((f, i) => `
        <div class="linha-item">
          <input type="checkbox" style="width:20px; height:20px" ${f.pago ? 'checked' : ''} onchange="confirmarPagamentoFixa(${i}, this.checked)">
          <div class="info-area ${f.pago ? 'pago-texto' : ''}"><span>${f.categoria}</span><b>${formatar(f.valor)}</b></div>
          <button onclick="remover('fixas', ${i})" class="btn-del">×</button>
        </div>`).join('');

      document.getElementById("lista-variaveis").innerHTML = info.variaveis.map((v, i) => `
        <div class="linha-item"><div class="info-area"><span>${v.categoria}</span><b>${formatar(v.valor)}</b></div>
        <button onclick="remover('variaveis', ${i})" class="btn-del">×</button></div>`).join('');

      document.getElementById("lista-pagamentos").innerHTML = info.pagamentosFatura.map((p, i) => `
        <div class="linha-item"><div class="info-area"><span>Pagamento Fatura</span><b>${formatar(p.valor)}</b></div>
        <button onclick="remover('pagamentosFatura', ${i})" class="btn-del">×</button></div>`).join('');

      atualizarResumo(mes);
    }

    function confirmarPagamentoFixa(index, isChecked) {
      const mes = document.getElementById("mes_select").value;
      if(isChecked) {
        const opcao = prompt("Fonte?\n1 - Crédito\n2 - Débito (Auto)\n3 - Extra");
        let meio = (opcao==="1")?'cartao':(opcao==="2")?((new Date().getDate()<=15)?'adiantamento':'salario'):'extra';
        dados[mes].fixas[index].pago = true;
        dados[mes].fixas[index].meio = meio;
      } else { dados[mes].fixas[index].pago = false; }
      salvar();
    }

    function atualizarResumo(mes) {
      const info = dados[mes];
      let vEx=0, vAd=0, vSa=0, pEx=0, pAd=0, pSa=0, gCa=0, pgFa=0;

      info.receitas.forEach(r => {
        const n = r.desc.toLowerCase();
        if(n.includes("adiant")) vAd += r.valor; else if(n.includes("salario")) vSa += r.valor; else vEx += r.valor;
      });

      info.fixas.forEach(f => {
        if(f.pago) {
          if(f.meio === 'extra') pEx += f.valor;
          else if(f.meio === 'adiantamento') pAd += f.valor;
          else if(f.meio === 'salario') pSa += f.valor;
          else if(f.meio === 'cartao') gCa += f.valor;
        }
      });

      info.variaveis.forEach(v => {
        if(v.meio === 'cartao') gCa += v.valor;
        else if(v.meio === 'extra') pEx += v.valor;
        else if(v.meio === 'adiantamento') pAd += v.valor;
        else if(v.meio === 'salario') pSa += v.valor;
      });

      info.pagamentosFatura.forEach(p => {
        pgFa += p.valor;
        if(p.fonte === 'extra') pEx += p.valor;
        else if(p.fonte === 'adiantamento') pAd += p.valor;
        else pSa += p.valor;
      });

      const usado = gCa - pgFa;
      document.getElementById("res-extra").innerText = formatar(vEx - pEx);
      document.getElementById("res-adiant").innerText = formatar(vAd - pAd);
      document.getElementById("res-salario").innerText = formatar(vSa - pSa);
      document.getElementById("res-cartao-info").innerText = formatar(usado);

      pintarBarra("bar-extra", pEx, vEx);
      pintarBarra("bar-adiant", pAd, vAd);
      pintarBarra("bar-salario", pSa, vSa);
      pintarBarra("bar-cartao", usado, dados.config.limiteCartao);
    }

    function pintarBarra(id, gasto, total) {
      const el = document.getElementById(id);
      const pct = total > 0 ? Math.min((gasto/total)*100, 100) : 0;
      el.style.width = pct + "%";
      if(pct <= 50) el.style.backgroundColor = "var(--green)";
      else if(pct <= 80) el.style.backgroundColor = "var(--orange)";
      else el.style.backgroundColor = "var(--red)";
    }

    function pagarFatura() {
      const v = parseFloat(prompt("Valor:"))||0; if(v <= 0) return;
      const opcao = prompt("1 - Débito (Auto)\n2 - Extra");
      let fonte = (opcao === "1") ? ((new Date().getDate() <= 15) ? 'adiantamento' : 'salario') : 'extra';
      dados[document.getElementById("mes_select").value].pagamentosFatura.push({valor: v, fonte: fonte});
      salvar();
    }

    function addItem(tipo) {
      let n = prompt("Descrição:"); if(!n) return;
      n = capitalizar(n);
      const v = parseFloat(prompt("Valor:"))||0;
      const opcao = prompt("1 - Crédito\n2 - Débito (Auto)\n3 - Extra");
      let meio = (opcao==="1")?'cartao':(opcao==="2")?((new Date().getDate()<=15)?'adiantamento':'salario'):'extra';
      dados[document.getElementById("mes_select").value][tipo].push({categoria:n, valor:v, meio:meio, pago:(tipo==='variaveis')});
      salvar();
    }

    function addReceita() {
      let n = prompt("Nome:"); if(!n) return;
      n = capitalizar(n);
      const v = parseFloat(prompt("Valor:"))||0;
      dados[document.getElementById("mes_select").value].receitas.push({desc:n, valor:v});
      salvar();
    }

    function popularMeses() {
      const s = document.getElementById("mes_select");
      if(s.options.length > 0) return;
      const ms = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
      ms.forEach((m, i) => {
        let o = document.createElement("option"); o.value = `2026-${String(i+1).padStart(2,'0')}`; o.textContent = m;
        if(i+1 === new Date().getMonth()+1) o.selected = true; s.appendChild(o);
      });
    }

    function mudarAba(event, aba) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.getElementById(`aba-${aba}`).classList.add('active');
      event.currentTarget.classList.add('active');
    }

    function remover(t, i) { if(confirm("Remover?")){ dados[document.getElementById("mes_select").value][t].splice(i,1); salvar(); } }
  </script>
</body>
</html>
