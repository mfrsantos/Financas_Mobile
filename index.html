<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>MS Finanças</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0078d4">
  
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <style>
    :root { --blue: #0078d4; --green: #107c10; --yellow: #ffb900; --orange: #d83b01; --red: #d13438; --bg: #1c1c1c; --card-bg: #2b2b2b; --border: #3c3c3c; }
    * { box-sizing: border-box; font-family: "Segoe UI", sans-serif; }
    body { margin: 0; background: var(--bg); color: #fff; overflow-x: hidden; }
    
    #app-content { display: none; padding: 10px; max-width: 800px; margin: 0 auto; padding-bottom: 80px; }
    
    /* Tabs */
    .tab-bar { display: flex; background: #252525; border-radius: 12px; padding: 4px; margin-bottom: 15px; border: 1px solid var(--border); }
    .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; color: #a1a1a1; font-weight: 700; border-radius: 8px; font-size: 0.65rem; }
    .tab-btn.active { background: #323232; color: var(--blue); }

    /* Cards */
    .cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .card { padding: 12px; border-radius: 12px; background: var(--card-bg); border: 1px solid var(--border); position: relative; overflow: hidden; height: 90px; }
    .card-header { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; }
    .card h2 { margin: 0; font-size: 0.55rem; color: #b0b0b0; text-transform: uppercase; }
    .card p { margin: 4px 0; font-size: 0.9rem; font-weight: 800; }
    .barra-bg { position: absolute; bottom: 0; left: 0; width: 100%; height: 4px; background: #333; }
    .barra-fill { height: 100%; width: 0%; transition: width 0.6s, background 0.4s; }

    /* Listas */
    .secao { background: var(--card-bg); padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid var(--border); }
    .linha-item { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #383838; gap: 10px; }
    .info-area { display: flex; flex: 1; justify-content: space-between; font-size: 0.8rem; }
    
    /* Botões */
    .btn-action { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 800; color: white; cursor: pointer; margin-top: 5px; }
    .btn-del { background: var(--red); color: white; border: none; border-radius: 6px; width: 26px; height: 26px; }

    /* MODAL CUSTOMIZADO */
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10000; align-items: center; justify-content: center; padding: 20px; }
    .modal-content { background: var(--card-bg); border: 1px solid var(--blue); padding: 20px; border-radius: 20px; width: 100%; max-width: 320px; text-align: center; }
    .modal-btn { width: 100%; padding: 12px; margin: 5px 0; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }

    input, select { background: #1a1a1a; color: white; border: 1px solid var(--border); padding: 10px; border-radius: 8px; width: 100%; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .pago-texto { text-decoration: line-through; color: #666; }
  </style>
</head>
<body>

  <div id="modal-fonte" class="modal">
    <div class="modal-content">
      <h3 style="margin-top:0">Selecione a Fonte</h3>
      <button class="modal-btn" style="background:var(--blue)" onclick="escolherFonte('cartao')">💳 Cartão de Crédito</button>
      <button class="modal-btn" style="background:var(--green)" onclick="escolherFonte('auto')">🏦 Débito Automático</button>
      <button class="modal-btn" style="background:var(--purple)" onclick="escolherFonte('extra')">💎 Saldo Extra</button>
      <button class="modal-btn" style="background:#444; margin-top:10px" onclick="fecharModal()">Cancelar</button>
    </div>
  </div>

  <div id="app-content">
    <header style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
      <span style="color:var(--blue); font-weight:800;">MS FINANÇAS</span>
      <button onclick="auth.signOut()" style="background:none; border:none; color:var(--red); font-size: 0.7rem;">Sair</button>
    </header>

    <select id="mes_select" onchange="renderizar();" style="margin-bottom:15px;"></select>

    <nav class="tab-bar">
      <button class="tab-btn active" onclick="mudarAba(event, 'resumo')">RESUMO</button>
      <button class="tab-btn" onclick="mudarAba(event, 'receitas')">RECEITAS</button>
      <button class="tab-btn" onclick="mudarAba(event, 'despesas')">DESPESAS</button>
      <button class="tab-btn" onclick="mudarAba(event, 'cartao')">CARTÃO</button>
    </nav>

    <main id="aba-resumo" class="tab-content active">
      <div class="cards-grid">
        <div class="card">
          <div class="card-header"><span>💎</span><h2>Saldo Extra</h2></div>
          <p id="res-extra">R$ 0,00</p>
          <div class="barra-bg"><div id="bar-extra" class="barra-fill"></div></div>
        </div>
        <div class="card">
          <div class="card-header"><span>📅</span><h2>Adiantamento</h2></div>
          <p id="res-adiant">R$ 0,00</p>
          <div class="barra-bg"><div id="bar-adiant" class="barra-fill"></div></div>
        </div>
        <div class="card">
          <div class="card-header"><span>💰</span><h2>Salário Final</h2></div>
          <p id="res-salario">R$ 0,00</p>
          <div class="barra-bg"><div id="bar-salario" class="barra-fill"></div></div>
        </div>
        <div class="card">
          <div class="card-header"><span>💳</span><h2>Uso do Cartão</h2></div>
          <p id="res-cartao-info">R$ 0,00</p>
          <div class="barra-bg"><div id="bar-cartao" class="barra-fill"></div></div>
        </div>
      </div>

      <div class="secao" style="margin-top:15px">
        <h3>Configurações</h3>
        <label style="font-size:0.7rem; color:#aaa">Limite do Cartão:</label>
        <input type="number" id="cfg-limite" step="0.01" onchange="dados.config.limiteCartao=parseFloat(this.value);salvar()">
      </div>
    </main>

    <main id="aba-receitas" class="tab-content">
      <div class="secao">
        <div id="lista-receitas"></div>
        <button onclick="addReceita()" class="btn-action" style="background:var(--green)">+ Adicionar Receita</button>
      </div>
    </main>

    <main id="aba-despesas" class="tab-content">
      <div class="secao">
        <h3>Fixas</h3>
        <div id="lista-fixas"></div>
        <button onclick="addItem('fixas')" class="btn-action" style="background:var(--purple)">+ Nova Fixa</button>
      </div>
      <div class="secao">
        <h3>Variáveis</h3>
        <div id="lista-variaveis"></div>
        <button onclick="addItem('variaveis')" class="btn-action" style="background:var(--yellow); color:#000">+ Nova Variável</button>
      </div>
    </main>

    <main id="aba-cartao" class="tab-content">
      <div class="secao">
        <h3>Pagamentos Realizados</h3>
        <div id="lista-pagamentos"></div>
        <button onclick="pagarFatura()" class="btn-action" style="background:var(--blue)">+ Registrar Pagamento</button>
      </div>
    </main>
  </div>

  <script>
    // Config Firebase
    const firebaseConfig = { apiKey: "AIzaSyBXOEwaB-i7hNRe_ezn1mW9G8p7bL6v8K0", authDomain: "ms-financas.firebaseapp.com", projectId: "ms-financas", storageBucket: "ms-financas.firebasestorage.app", messagingSenderId: "825396392769", appId: "1:825396392769:web:0a67fd59dc6bd18391e7c0" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    let dados = {};
    let pendentePagamento = { tipo: '', index: '' };

    auth.onAuthStateChanged(user => {
      if (user) { document.getElementById('app-content').style.display = 'block'; carregarDados(user.uid); }
      else { window.location.href = "index.html"; } // Simples fallback para login
    });

    async function carregarDados(uid) {
      const doc = await db.collection("usuarios").doc(uid).get();
      dados = doc.exists ? doc.data() : inicializar();
      if(!dados.config) dados.config = { limiteCartao: 2000 };
      document.getElementById('cfg-limite').value = dados.config.limiteCartao;
      popularMeses();
      renderizar();
    }

    async function salvar() {
      await db.collection("usuarios").doc(auth.currentUser.uid).set(dados);
      renderizar();
    }

    function inicializar() {
      const base = { config: { limiteCartao: 2000.00 } };
      for (let m = 1; m <= 12; m++) { base[`2026-${String(m).padStart(2, '0')}`] = { receitas: [{desc: "Adiantamento", valor: 0}, {desc: "Salário", valor: 0}], fixas: [], variaveis: [], pagamentosFatura: [] }; }
      return base;
    }

    function formatar(v) { return Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }
    function cap(t) { return t.charAt(0).toUpperCase() + t.slice(1); }

    function renderizar() {
      const mes = document.getElementById("mes_select").value || "2026-03";
      const info = dados[mes];

      document.getElementById("lista-receitas").innerHTML = info.receitas.map((r, i) => `
        <div class="linha-item"><span class="info-area"><b>${r.desc}</b></span>
        <input type="number" step="0.01" style="width:90px" value="${r.valor.toFixed(2)}" onchange="dados['${mes}'].receitas[${i}].valor=parseFloat(this.value);salvar()">
        </div>`).join('');

      document.getElementById("lista-fixas").innerHTML = info.fixas.map((f, i) => `
        <div class="linha-item">
          <input type="checkbox" style="width:22px;height:22px" ${f.pago ? 'checked' : ''} onchange="acionarCheck(${i}, this.checked)">
          <div class="info-area ${f.pago ? 'pago-texto' : ''}"><span>${f.categoria}</span><b>${formatar(f.valor)}</b></div>
          <button onclick="remover('fixas', ${i})" class="btn-del">×</button>
        </div>`).join('');

      document.getElementById("lista-variaveis").innerHTML = info.variaveis.map((v, i) => `
        <div class="linha-item"><div class="info-area"><span>${v.categoria}</span><b>${formatar(v.valor)}</b></div>
        <button onclick="remover('variaveis', ${i})" class="btn-del">×</button></div>`).join('');

      document.getElementById("lista-pagamentos").innerHTML = info.pagamentosFatura.map((p, i) => `
        <div class="linha-item"><div class="info-area"><span>Pagamento Fatura</span><b>${formatar(p.valor)}</b></div>
        <button onclick="remover('pagamentosFatura', ${i})" class="btn-del">×</button></div>`).join('');

      atualizarResumo(mes);
    }

    // GATILHO: SÓ PERGUNTA AO CLICAR NO CHECKBOX
    function acionarCheck(index, isChecked) {
      if(isChecked) {
        pendentePagamento = { tipo: 'fixas', index: index };
        document.getElementById('modal-fonte').style.display = 'flex';
      } else {
        const mes = document.getElementById("mes_select").value;
        dados[mes].fixas[index].pago = false;
        dados[mes].fixas[index].meio = '';
        salvar();
      }
    }

    function escolherFonte(fonte) {
      const mes = document.getElementById("mes_select").value;
      let meioReal = fonte;
      if(fonte === 'auto') meioReal = (new Date().getDate() <= 15) ? 'adiantamento' : 'salario';
      
      if(pendentePagamento.tipo === 'fatura') {
          dados[mes].pagamentosFatura.push({valor: pendentePagamento.valor, fonte: meioReal});
      } else {
          dados[mes][pendentePagamento.tipo][pendentePagamento.index].pago = true;
          dados[mes][pendentePagamento.tipo][pendentePagamento.index].meio = meioReal;
      }
      fecharModal();
      salvar();
    }

    function fecharModal() { 
        document.getElementById('modal-fonte').style.display = 'none'; 
        renderizar(); 
    }

    function atualizarResumo(mes) {
      const info = dados[mes];
      let vEx=0, vAd=0, vSa=0, pEx=0, pAd=0, pSa=0, gCa=0, pgFa=0;

      // SEPARAÇÃO RIGOROSA DE RECEITAS
      info.receitas.forEach(r => {
        const n = r.desc.toLowerCase();
        if(n.includes("adiant")) vAd += r.valor; 
        else if(n.includes("salario")) vSa += r.valor; 
        else vEx += r.valor; // Se não tem "adiant" nem "salario", é EXTRA purificado.
      });

      info.fixas.forEach(f => {
        if(f.pago) {
          if(f.meio === 'extra') pEx += f.valor;
          else if(f.meio === 'adiantamento') pAd += f.valor;
          else if(f.meio === 'salario') pSa += f.valor;
          else if(f.meio === 'cartao') gCa += f.valor;
        }
      });

      info.variaveis.forEach(v => {
        if(v.meio === 'cartao') gCa += v.valor;
        else if(v.meio === 'extra') pEx += v.valor;
        else if(v.meio === 'adiantamento') pAd += v.valor;
        else if(v.meio === 'salario') pSa += v.valor;
      });

      info.pagamentosFatura.forEach(p => {
        pgFa += p.valor;
        if(p.fonte === 'extra') pEx += p.valor;
        else if(p.fonte === 'adiantamento') pAd += p.valor;
        else pSa += p.valor;
      });

      const usado = gCa - pgFa;
      document.getElementById("res-extra").innerText = formatar(vEx - pEx);
      document.getElementById("res-adiant").innerText = formatar(vAd - pAd);
      document.getElementById("res-salario").innerText = formatar(vSa - pSa);
      document.getElementById("res-cartao-info").innerText = formatar(usado);

      pintarBarra("bar-extra", pEx, vEx);
      pintarBarra("bar-adiant", pAd, vAd);
      pintarBarra("bar-salario", pSa, vSa);
      pintarBarra("bar-cartao", usado, dados.config.limiteCartao);
    }

    function pintarBarra(id, g, t) {
      const el = document.getElementById(id);
      const pct = t > 0 ? Math.min((g/t)*100, 100) : 0;
      el.style.width = pct + "%";
      el.style.backgroundColor = pct <= 50 ? "var(--green)" : pct <= 80 ? "var(--orange)" : "var(--red)";
    }

    function pagarFatura() {
      const v = parseFloat(prompt("Valor:"))||0; if(v <= 0) return;
      pendentePagamento = { tipo: 'fatura', valor: v };
      document.getElementById('modal-fonte').style.display = 'flex';
    }

    function addItem(tipo) {
      let n = prompt("Descrição:"); if(!n) return;
      const v = parseFloat(prompt("Valor:"))||0;
      if(tipo === 'variaveis') {
          pendentePagamento = { tipo: 'variaveis', desc: cap(n), valor: v };
          document.getElementById('modal-fonte').style.display = 'flex';
          // Para variáveis, criamos o objeto já no escolherFonte
          dados[document.getElementById("mes_select").value].variaveis.push({categoria:cap(n), valor:v, meio:'', pago:true});
          pendentePagamento.index = dados[document.getElementById("mes_select").value].variaveis.length - 1;
      } else {
          dados[document.getElementById("mes_select").value].fixas.push({categoria:cap(n), valor:v, meio:'', pago:false});
          salvar();
      }
    }

    function addReceita() {
      let n = prompt("Nome:"); if(!n) return;
      const v = parseFloat(prompt("Valor:"))||0;
      dados[document.getElementById("mes_select").value].receitas.push({desc:cap(n), valor:v});
      salvar();
    }

    function popularMeses() {
      const s = document.getElementById("mes_select");
      if(s.options.length > 0) return;
      const ms = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
      ms.forEach((m, i) => {
        let o = document.createElement("option"); o.value = `2026-${String(i+1).padStart(2,'0')}`; o.textContent = m;
        if(i+1 === new Date().getMonth()+1) o.selected = true; s.appendChild(o);
      });
    }

    function mudarAba(e, aba) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.getElementById(`aba-${aba}`).classList.add('active'); e.currentTarget.classList.add('active');
    }

    function remover(t, i) { if(confirm("Remover?")){ dados[document.getElementById("mes_select").value][t].splice(i,1); salvar(); } }
  </script>
</body>
</html>
