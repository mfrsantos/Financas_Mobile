<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ERP Finanças MS Informática</title>
  <link rel="manifest" href="./manifest.json">
  
  <style>
    :root { 
      --blue: #0078d4; --green: #107c10; --yellow: #ffb900; --purple: #8764b8; --red: #d13438; 
      --bg: #1c1c1c; --card-bg: #2b2b2b; --border: #3c3c3c;
    }
    * { box-sizing: border-box; font-family: "Segoe UI", system-ui, sans-serif; touch-action: manipulation; }
    body { margin: 0; background: var(--bg); color: #ffffff; overflow-x: hidden; width: 100vw; }
    
    #alerta-backup { display: none; width: 100%; padding: 14px; border: none; font-weight: 800; font-size: 0.85rem; text-align: center; cursor: pointer; background: var(--red); color: #fff; border-radius: 0 0 10px 10px; animation: pulse 2s infinite; z-index: 1001; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

    .container { width: 100%; padding: 10px; max-width: 800px; margin: 0 auto; padding-bottom: 30px; }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 5px; }
    h1 { font-size: 0.95rem; margin: 0; color: var(--blue); font-weight: 700; text-transform: uppercase; }

    .tab-bar { display: flex; background: #252525; border-radius: 12px; padding: 4px; margin-bottom: 15px; position: sticky; top: 10px; z-index: 100; border: 1px solid var(--border); }
    .tab-btn { flex: 1; padding: 12px 5px; border: none; background: transparent; color: #a1a1a1; font-size: 0.7rem; font-weight: 700; border-radius: 8px; cursor: pointer; }
    .tab-btn.active { background: #323232; color: var(--blue); box-shadow: 0 2px 8px rgba(0,0,0,0.4); }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .card { padding: 12px; border-radius: 12px; background: var(--card-bg); border: 1px solid var(--border); border-bottom: 3px solid var(--blue); }
    .card h2 { margin: 0 0 5px; font-size: 0.6rem; color: #b0b0b0; text-transform: uppercase; }
    .card p { margin: 0; font-size: 0.9rem; font-weight: 800; }

    .barra-consumo { width: 100%; height: 4px; background: #444; border-radius: 2px; margin-top: 8px; overflow: hidden; }
    .progresso { height: 100%; width: 0%; transition: width 0.5s, background 0.5s; }

    .secao { background: var(--card-bg); padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid var(--border); }
    .secao h3 { margin: 0 0 15px 0; font-size: 0.8rem; color: var(--blue); border-bottom: 1px solid var(--border); padding-bottom: 8px; }

    .linha-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #383838; gap: 10px; width: 100%; }
    .info-area { display: flex; flex: 1; align-items: center; justify-content: space-between; }
    .desc-txt { font-size: 0.8rem; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; }
    .valor-txt { font-size: 0.8rem; font-weight: 700; }
    
    input, select { background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 6px; padding: 8px; font-size: 0.85rem; }
    .input-valor { width: 85px; text-align: right; }
    .btn-del { background: var(--red); width: 30px; height: 30px; border-radius: 8px; border: none; color: white; font-weight: bold; cursor: pointer; }
    
    .btn-acao { width: 100%; padding: 12px; border: none; border-radius: 8px; color: white; font-weight: 700; margin-top: 10px; cursor: pointer; }
  </style>
</head>
<body>

  <button id="alerta-backup" onclick="exportarJSON()">⚠️ SALVAR BACKUP AGORA (HÁ MAIS DE 7 DIAS)</button>

  <div class="container">
    <header>
      <h1>📊 MS FINANÇAS</h1>
      <select id="mes_select" onchange="renderizar();"></select>
    </header>

    <nav class="tab-bar">
      <button class="tab-btn active" onclick="mudarAba('resumo')">RESUMO</button>
      <button class="tab-btn" onclick="mudarAba('receitas')">RECEITAS</button>
      <button class="tab-btn" onclick="mudarAba('despesas')">DESPESAS</button>
    </nav>

    <main id="aba-resumo" class="tab-content active">
      <div class="cards-grid">
        <div class="card" style="border-bottom-color: var(--yellow);">
          <h2>Bruta Total</h2><p id="res-bruta">R$ 0,00</p>
        </div>
        <div class="card" style="border-bottom-color: var(--purple);">
          <h2>Extra Livre</h2><p id="res-extra">R$ 0,00</p>
          <div class="barra-consumo"><div id="prog-extra" class="progresso"></div></div>
        </div>
        <div class="card" style="border-bottom-color: var(--blue);">
          <h2>Adiantamento</h2><p id="res-adiant">R$ 0,00</p>
          <div class="barra-consumo"><div id="prog-adiant" class="progresso"></div></div>
        </div>
        <div class="card" style="border-bottom-color: var(--green);">
          <h2>Salário Limpo</h2><p id="res-salario">R$ 0,00</p>
          <div class="barra-consumo"><div id="prog-salario" class="progresso"></div></div>
        </div>
        <div class="card" style="grid-column: span 2; border-bottom-color: var(--yellow);">
          <div style="display:flex; justify-content: space-between;"><h2>Limite Disponível</h2><span id="res-gasto-cartao" style="font-size:0.6rem">Gasto: R$ 0,00</span></div>
          <p id="res-fatura" style="font-size: 1.1rem;">R$ 0,00</p>
        </div>
      </div>
      
      <div class="secao" style="margin-top:15px;">
        <h3>Configuração de Limite</h3>
        <input type="number" id="input-limite" class="input-valor" style="width:100%" onchange="dados.config.limiteCartao = parseFloat(this.value)||0; salvar();">
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <button onclick="exportarJSON()" class="btn-acao" style="background: var(--blue); margin-top:0;">📤 Backup</button>
        <button onclick="document.getElementById('input-import').click()" class="btn-acao" style="background: #444; margin-top:0;">📥 Importar</button>
        <input type="file" id="input-import" style="display: none;" onchange="importarJSON(event)">
      </div>
    </main>

    <main id="aba-receitas" class="tab-content">
      <div class="secao">
        <h3>Entradas Mensais</h3>
        <div id="lista-receitas"></div>
        <button onclick="addReceita()" class="btn-acao" style="background:var(--green);">+ Nova Receita</button>
      </div>

      <div class="secao" style="border-left: 4px solid var(--yellow);">
        <h3>Pagamento/Antecipação de Fatura</h3>
        <div id="lista-fatura"></div>
        <div style="background: #1a1a1a; padding: 12px; border-radius: 12px; margin-top: 10px;">
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px;">
            <input type="date" id="fat-data">
            <input type="number" id="fat-valor" placeholder="R$" step="0.01" class="input-valor" style="width:100%">
          </div>
          <div style="display: flex; gap: 8px;">
            <select id="fat-meio" style="flex:1.5">
              <option value="debito">💰 Débito (Data)</option>
              <option value="extra">✨ Renda Extra</option>
            </select>
            <button onclick="registrarPagamentoFatura()" style="flex:1; background:var(--green); border-radius:8px; border:none; color:white; font-weight:700; cursor:pointer;">Pagar</button>
          </div>
        </div>
      </div>
    </main>

    <main id="aba-despesas" class="tab-content">
      <div class="secao">
        <h3>Contas Fixas</h3>
        <div id="lista-fixas"></div>
        <button onclick="addDespesaFixa()" class="btn-acao" style="background:var(--purple);">+ Nova Conta Fixa</button>
      </div>
      <div class="secao">
        <h3>Compras Avulsas</h3>
        <div id="lista-diversas"></div>
        <div style="background: #1a1a1a; padding: 12px; border-radius: 12px; margin-top: 10px;">
          <input type="text" id="var-desc" placeholder="O que comprou?" style="width:100%; margin-bottom:8px;">
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px;">
            <input type="date" id="var-data">
            <input type="number" id="var-valor" placeholder="R$" step="0.01" class="input-valor" style="width:100%">
          </div>
          <div style="display: flex; gap: 8px;">
            <select id="var-meio" style="flex:1.5">
              <option value="debito">💰 Débito</option>
              <option value="credito">💳 Crédito</option>
              <option value="extra">✨ Extra</option>
            </select>
            <button onclick="addVariavel()" style="flex:1; background:var(--blue); border-radius:8px; border:none; color:white; font-weight:700; cursor:pointer;">Salvar</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const STORAGE_KEY = "Financas_Marcus_v2_7_4";
    let dados = JSON.parse(localStorage.getItem(STORAGE_KEY)) || inicializar();

    function inicializar() {
      const base = { config: { limiteCartao: 2000.00, ultimoBackup: new Date().toISOString() } };
      for (let m = 1; m <= 12; m++) {
        base[`2026-${String(m).padStart(2, '0')}`] = { receitas: [{desc: "Adiantamento", valor: 0}, {desc: "Salário", valor: 0}], fixas: [], variaveis: [], pagamentosFatura: [] };
      }
      return base;
    }

    function salvar() { localStorage.setItem(STORAGE_KEY, JSON.stringify(dados)); renderizar(); verificarBackup(); }
    function formatar(v) { return Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }

    function renderizar() {
      const mes = document.getElementById("mes_select").value;
      const info = dados[mes];
      document.getElementById("input-limite").value = dados.config.limiteCartao;

      document.getElementById("lista-receitas").innerHTML = info.receitas.map((r, i) => `<div class="linha-item"><span class="desc-txt">${r.desc}</span><input type="number" step="0.01" class="input-valor" value="${parseFloat(r.valor||0).toFixed(2)}" onchange="dados['${mes}'].receitas[${i}].valor=parseFloat(this.value)||0;salvar()"><button onclick="removerItem('receitas', ${i})" class="btn-del">×</button></div>`).join('');
      document.getElementById("lista-fixas").innerHTML = info.fixas.map((f, i) => `<div class="linha-item"><div class="info-area"><span class="desc-txt">${f.categoria}</span><span class="valor-txt">${formatar(f.valor)}</span></div><button onclick="removerItem('fixas', ${i})" class="btn-del">×</button></div>`).join('');
      document.getElementById("lista-diversas").innerHTML = info.variaveis.map((v, i) => `<div class="linha-item"><div class="info-area"><span class="desc-txt">${v.descricao}</span><span class="valor-txt">${formatar(v.valor)}</span><span>${v.meio==='credito'?'💳':v.meio==='extra'?'✨':'💰'}</span></div><button onclick="removerItem('variaveis', ${i})" class="btn-del">×</button></div>`).join('');
      document.getElementById("lista-fatura").innerHTML = (info.pagamentosFatura||[]).map((p, i) => `<div class="linha-item"><div class="info-area"><span class="desc-txt">${p.data.split('-')[2]} | ${p.meio}</span><span class="valor-txt" style="color:var(--green)">${formatar(p.valor)}</span></div><button onclick="removerFatura(${i})" class="btn-del">×</button></div>`).join('');

      atualizarResumo();
    }

    function atualizarResumo() {
      const mes = document.getElementById("mes_select").value;
      const info = dados[mes];
      let bruta=0, vExtra=0, vAdiant=0, vSal=0, pExtra=0, pAdiant=0, pSal=0, gCartao=0, pFat=0;

      info.receitas.forEach(r => { 
        const v = parseFloat(r.valor||0); bruta += v;
        const n = r.desc.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
        if (n.includes("adiant")) vAdiant += v; else if (n.includes("salario")) vSal += v; else vExtra += v;
      });

      [...info.fixas, ...info.variaveis].forEach(it => {
        const v = parseFloat(it.valor||0);
        if(it.meio==='credito') gCartao += v;
        else if(it.meio==='extra') pExtra += v;
        else { 
            const d = parseInt(it.data?.split('-')[2]||10); 
            if(d <= 15) pAdiant += v; else pSal += v; 
        }
      });

      (info.pagamentosFatura||[]).forEach(p => {
        const v = parseFloat(p.valor||0); pFat += v;
        if(p.meio === 'extra') pExtra += v; 
        else { 
            const d = parseInt(p.data.split('-')[2]); 
            if(d <= 15) pAdiant += v; else pSal += v; 
        }
      });

      document.getElementById("res-bruta").innerText = formatar(bruta);
      document.getElementById("res-extra").innerText = formatar(vExtra - pExtra);
      document.getElementById("res-adiant").innerText = formatar(vAdiant - pAdiant);
      document.getElementById("res-salario").innerText = formatar(vSal - pSal);
      
      const real = gCartao - pFat;
      document.getElementById("res-fatura").innerText = formatar(dados.config.limiteCartao - real);
      document.getElementById("res-gasto-cartao").innerText = `Gasto: ${formatar(real)}`;

      atualizarBarra("prog-extra", pExtra, vExtra);
      atualizarBarra("prog-adiant", pAdiant, vAdiant);
      atualizarBarra("prog-salario", pSal, vSal);
    }

    function atualizarBarra(id, gasto, total) {
      const el = document.getElementById(id);
      const pct = total > 0 ? Math.min((gasto / total) * 100, 100) : 0;
      el.style.width = pct + "%";
      el.style.background = pct > 90 ? "var(--red)" : pct > 65 ? "var(--yellow)" : "var(--blue)";
    }

    function registrarPagamentoFatura() {
      const mes = document.getElementById("mes_select").value, d = document.getElementById("fat-data").value, v = document.getElementById("fat-valor").value, m = document.getElementById("fat-meio").value;
      if(!d || !v) return alert("Preencha data e valor!");
      if(!dados[mes].pagamentosFatura) dados[mes].pagamentosFatura = [];
      dados[mes].pagamentosFatura.push({data:d, valor:parseFloat(v.replace(',','.')), meio:m});
      document.getElementById("fat-valor").value = ""; salvar();
    }

    function addReceita() { const n = prompt("Nome da Receita:"); if(n){ const v = parseFloat(prompt("Valor:").replace(',','.'))||0; dados[document.getElementById("mes_select").value].receitas.push({desc:n, valor:v}); salvar(); } }
    function addDespesaFixa() { const n = prompt("Nome da Conta:"); if(n){ const v = parseFloat(prompt("Valor:").replace(',','.'))||0; dados[document.getElementById("mes_select").value].fixas.push({categoria:n, valor:v, meio:'debito', data: `${document.getElementById("mes_select").value}-10` }); salvar(); } }
    function addVariavel() {
      const mes = document.getElementById("mes_select").value, d = document.getElementById("var-data").value, desc = document.getElementById("var-desc").value, v = document.getElementById("var-valor").value, m = document.getElementById("var-meio").value;
      if(!d || !v) return alert("Data e valor são obrigatórios!");
      dados[mes].variaveis.push({data:d, descricao:desc||"Diversos", valor:parseFloat(v.replace(',','.')), meio:m});
      document.getElementById("var-desc").value = ""; document.getElementById("var-valor").value = ""; salvar();
    }

    function mudarAba(aba) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      event.currentTarget.classList.add('active');
      document.getElementById(`aba-${aba}`).classList.add('active');
    }

    function removerItem(t, i) { if(confirm("Deseja realmente excluir este item?")){ dados[document.getElementById("mes_select").value][t].splice(i,1); salvar(); } }
    function removerFatura(i) { if(confirm("Excluir este pagamento de fatura?")){ dados[document.getElementById("mes_select").value].pagamentosFatura.splice(i,1); salvar(); } }
    function exportarJSON() { dados.config.ultimoBackup = new Date().toISOString(); const b = new Blob([JSON.stringify(dados)], {type:'application/json'}); const a = document.createElement('a'); a.href=URL.createObjectURL(b); a.download=`Backup_Financas_MS.json`; a.click(); salvar(); }
    function importarJSON(e) { const r = new FileReader(); r.onload = (v) => { try { dados = JSON.parse(v.target.result); salvar(); } catch(e){ alert("Erro ao importar arquivo!"); } }; r.readAsText(e.target.files[0]); }
    function verificarBackup() { const u = new Date(dados.config.ultimoBackup || 0); document.getElementById("alerta-backup").style.display = (new Date() - u) / 86400000 > 7 ? "block" : "none"; }
    
    function popularMeses() {
      const s = document.getElementById("mes_select"), ms = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
      const atual = new Date().getMonth() + 1;
      ms.forEach((m, i) => {
        let o = document.createElement("option"); o.value = `2026-${String(i+1).padStart(2,'0')}`; o.textContent = m;
        if(i+1 === atual) o.selected = true; s.appendChild(o);
      });
    }

    popularMeses(); renderizar(); verificarBackup();
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js'); }
  </script>
</body>
</html>
