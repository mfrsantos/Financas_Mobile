<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>MS Finanças v6.4.0</title>
  
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root { --blue: #0078d4; --green: #107c10; --yellow: #ffb900; --orange: #d83b01; --red: #d13438; --bg: #1c1c1c; --card-bg: #2b2b2b; --border: #3c3c3c; }
    * { box-sizing: border-box; font-family: "Segoe UI", sans-serif; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; background: var(--bg); color: #fff; padding-bottom: 50px; }
    
    input, select { width: 100%; padding: 20px; margin-bottom: 15px; border-radius: 12px; background: #111; color: #fff; border: 1px solid #444; font-size: 1.1rem; }
    .btn-action { width: 100%; padding: 22px; border: none; border-radius: 15px; font-weight: 800; color: white; cursor: pointer; margin-top: 10px; font-size: 1.1rem; }
    
    #app-content { display: none; padding: 15px; max-width: 800px; margin: 0 auto; }
    .tab-bar { display: flex; background: #252525; border-radius: 15px; padding: 5px; margin-bottom: 20px; border: 1px solid var(--border); }
    .tab-btn { flex: 1; padding: 18px 5px; border: none; background: transparent; color: #a1a1a1; font-weight: 700; border-radius: 10px; font-size: 0.75rem; }
    .tab-btn.active { background: #323232; color: var(--blue); border: 1px solid #444; }
    
    .cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .card { padding: 15px; border-radius: 15px; background: var(--card-bg); border: 1px solid var(--border); height: 160px; display: flex; flex-direction: column; justify-content: center; position: relative; overflow: hidden; }
    .card h2 { margin: 0; font-size: 0.7rem; color: #b0b0b0; text-transform: uppercase; margin-bottom: 8px; }
    .card p { margin: 2px 0; font-size: 1.1rem; font-weight: 800; z-index: 2; }
    
    /* Estilo específico para o Card de Cartão */
    .card-info-linha { font-size: 1rem; font-weight: 600; margin: 2px 0; }
    .label-utilizado { color: var(--red); }
    .label-disponivel { color: var(--green); }

    .barra-progresso { position: absolute; bottom: 0; left: 0; width: 100%; height: 8px; background: #333; }
    .fill { height: 100%; transition: width 0.5s ease, background 0.3s; }

    .secao { background: var(--card-bg); padding: 18px; border-radius: 20px; margin-bottom: 20px; border: 1px solid var(--border); }
    .linha-item { display: flex; align-items: center; padding: 18px 0; border-bottom: 1px solid #383838; gap: 12px; }
    
    .check-pg { width: 40px; height: 40px; border: 2px solid #666; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
    .check-pg.pago { background: var(--green); border-color: var(--green); }
    .check-pg.pago::after { content: '✓'; color: white; font-weight: bold; font-size: 1.2rem; }

    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; align-items: center; justify-content: center; padding: 20px; }
    .modal-content { background: var(--card-bg); border: 2px solid var(--blue); padding: 25px; border-radius: 25px; width: 100%; max-width: 400px; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
  </style>
</head>
<body>

  <div id="tela-login" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px;">
    <div id="box-login" style="background: var(--card-bg); padding: 30px; border-radius: 25px; width: 100%; max-width: 350px; border: 1px solid var(--blue); text-align: center;">
      <h2 style="color:var(--blue); margin-bottom:20px;">MS FINANÇAS</h2>
      <input type="email" id="l-email" placeholder="E-mail">
      <input type="password" id="l-pass" placeholder="Senha">
      <button class="btn-action" style="background:var(--blue)" onclick="autenticar('login')">ENTRAR</button>
      <button onclick="alternarTela('cadastro')" style="background:none; border:none; color:var(--blue); margin-top:15px; font-weight:bold;">CRIAR NOVA CONTA</button>
    </div>
    <div id="box-cadastro" style="background: var(--card-bg); padding: 30px; border-radius: 25px; width: 100%; max-width: 350px; border: 1px solid var(--green); text-align: center; display:none;">
      <h2 style="color:var(--green); margin-bottom:20px;">CADASTRO</h2>
      <input type="email" id="c-email" placeholder="E-mail">
      <input type="password" id="c-pass" placeholder="Senha">
      <button class="btn-action" style="background:var(--green)" onclick="autenticar('cadastro')">CADASTRAR</button>
      <button onclick="alternarTela('login')" style="background:none; border:none; color:#888; margin-top:15px;">Voltar</button>
    </div>
  </div>

  <div id="app-content">
    <select id="mes_select" onchange="renderizar();"></select>

    <nav class="tab-bar">
      <button class="tab-btn active" onclick="mudarTab(event, 'resumo')">RESUMO</button>
      <button class="tab-btn" onclick="mudarTab(event, 'receitas')">RENDAS</button>
      <button class="tab-btn" onclick="mudarTab(event, 'despesas')">CONTAS</button>
      <button class="tab-btn" onclick="mudarTab(event, 'cartao')">CARTÃO</button>
    </nav>

    <main id="aba-resumo" class="tab-content active">
      <div class="cards-grid">
        <div class="card">
            <h2>💎 Renda Extra</h2>
            <p id="r-extra">R$ 0,00</p>
            <div class="barra-progresso"><div id="f-extra" class="fill"></div></div>
        </div>
        <div class="card">
            <h2>💰 Salário (01-15)</h2>
            <p id="r-salario">R$ 0,00</p>
            <div class="barra-progresso"><div id="f-salario" class="fill"></div></div>
        </div>
        <div class="card">
            <h2>📅 Adiantam. (16-31)</h2>
            <p id="r-adiant">R$ 0,00</p>
            <div class="barra-progresso"><div id="f-adiant" class="fill"></div></div>
        </div>
        <div class="card" id="card-cartao-resumo">
            <h2>💳 Cartão de Crédito</h2>
            <p class="card-info-linha">Total: <span id="c-total-val">R$ 0,00</span></p>
            <p class="card-info-linha label-utilizado">Uso: <span id="c-uso-val">R$ 0,00</span></p>
            <p class="card-info-linha label-disponivel">Disp: <span id="c-disp-val">R$ 0,00</span></p>
            <div class="barra-progresso"><div id="f-cartao" class="fill"></div></div>
        </div>
      </div>
      <center><canvas id="meuGrafico" style="max-width:320px; margin-top:30px;"></canvas></center>
    </main>

    <main id="aba-receitas" class="tab-content">
      <div class="secao">
        <h3>Recebimentos</h3>
        <div id="l-receitas"></div>
        <button onclick="abrirModal('r_fixas')" class="btn-action" style="background:var(--blue)">+ SALÁRIO / ADIANT.</button>
        <button onclick="abrirModal('r_extras')" class="btn-action" style="background:var(--green)">+ RENDA EXTRA</button>
      </div>
    </main>

    <main id="aba-despesas" class="tab-content">
      <div class="secao"><h3>Minhas Contas</h3><div id="l-contas"></div><button onclick="abrirModal('contas')" class="btn-action" style="background:var(--orange)">+ NOVA CONTA</button></div>
    </main>

    <main id="aba-cartao" class="tab-content">
      <div class="secao">
        <label>Limite Total do Cartão:</label>
        <input type="number" id="c-limite" onchange="salvarLimite(this.value)">
        <h3>Antecipações Realizadas</h3>
        <div id="l-pgs"></div>
        <button onclick="abrirModal('pgs')" class="btn-action" style="background:var(--blue)">+ ANTECIPAR FATURA</button>
      </div>
    </main>
  </div>

  <div id="modal-input" class="modal"><div class="modal-content">
    <h3 id="input-titulo">Novo Registro</h3>
    <div id="div-desc"><input type="text" id="in-desc" placeholder="Descrição"></div>
    <input type="number" id="in-valor" placeholder="Valor R$">
    <input type="date" id="in-data">
    <button class="btn-action" style="background:var(--blue)" onclick="salvarNovo()">SALVAR</button>
    <button class="btn-action" style="background:#444" onclick="fecharModais()">CANCELAR</button>
  </div></div>

  <div id="modal-pagar" class="modal"><div class="modal-content">
    <h3>Pagar com:</h3>
    <p id="pg-info" style="color:#aaa;"></p>
    <button class="btn-action" style="background:var(--blue)" onclick="processarPagamento('debito')">DÉBITO (SALÁRIO/AD.)</button>
    <button class="btn-action" style="background:var(--green)" onclick="processarPagamento('extra')">RENDA EXTRA</button>
    <button id="btn-pg-credito" class="btn-action" style="background:var(--red)" onclick="processarPagamento('credito')">CARTÃO DE CRÉDITO</button>
  </div></div>

  <script>
    const firebaseConfig = { apiKey: "AIzaSyBXOEwaB-i7hNRe_ezn1mW9G8p7bL6v8K0", authDomain: "ms-financas.firebaseapp.com", projectId: "ms-financas", storageBucket: "ms-financas.firebasestorage.app", messagingSenderId: "825396392769", appId: "1:825396392769:web:0a67fd59dc6bd18391e7c0" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.firestore();
    let dados = {}, uid = "", pendente = {}, chartInstancia = null;

    const fmt = v => Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});

    auth.onAuthStateChanged(user => {
      document.getElementById('tela-login').style.display = user ? 'none' : 'flex';
      document.getElementById('app-content').style.display = user ? 'block' : 'none';
      if(user) { uid = user.uid; sync(); }
    });

    function alternarTela(t) {
        document.getElementById('box-login').style.display = t === 'login' ? 'block' : 'none';
        document.getElementById('box-cadastro').style.display = t === 'cadastro' ? 'block' : 'none';
    }

    async function autenticar(m) {
      const e = document.getElementById(m==='login'?'l-email':'c-email').value;
      const p = document.getElementById(m==='login'?'l-pass':'c-pass').value;
      try {
        if(m==='login') await auth.signInWithEmailAndPassword(e,p);
        else await auth.createUserWithEmailAndPassword(e,p);
      } catch(err) { alert(err.message); }
    }

    async function sync() {
      popMeses();
      const doc = await db.collection("usuarios").doc(uid).get();
      dados = doc.exists ? doc.data() : { config: { limite: 0 } };
      document.getElementById('c-limite').value = dados.config?.limite || 0;
      renderizar();
    }

    async function save() { await db.collection("usuarios").doc(uid).set(dados); renderizar(); }
    function salvarLimite(v) { if(!dados.config) dados.config = {}; dados.config.limite = parseFloat(v) || 0; save(); }

    function getCor(percent) {
        if(percent < 60) return 'var(--green)';
        if(percent < 80) return 'var(--orange)';
        return 'var(--red)';
    }

    function renderizar() {
      const mes = document.getElementById("mes_select").value;
      if(!dados[mes]) dados[mes] = { r_fixas: [], r_extras: [], contas: [], pgs: [] };
      const d = dados[mes];

      let bSalario = d.r_fixas.filter(r => !r.d.toLowerCase().includes('adiant')).reduce((a,b)=>a+b.v,0);
      let bAdiant = d.r_fixas.filter(r => r.d.toLowerCase().includes('adiant')).reduce((a,b)=>a+b.v,0);
      let bExtra = d.r_extras.reduce((a,b)=>a+b.v,0);
      let totalRenda = bSalario + bAdiant + bExtra;

      let dSalario = 0, dAdiant = 0, dExtra = 0, fatura = 0, totalDespesa = 0;

      d.contas.forEach(c => {
        if(c.pago) {
            totalDespesa += c.v;
            if(c.fonte === 'debito') {
                let dia = parseInt(c.data.split('-')[2]);
                if(dia <= 15) dSalario += c.v; else dAdiant += c.v;
            } else if(c.fonte === 'extra') dExtra += c.v;
            else if(c.fonte === 'credito') fatura += c.v;
        } else if(c.fonte === 'credito') {
             fatura += c.v;
        }
      });

      d.pgs.forEach(p => {
          fatura -= p.v;
          if(p.fonte === 'debito') {
              let dia = parseInt(p.data.split('-')[2]);
              if(dia <= 15) dSalario += p.v; else dAdiant += p.v;
          } else if(p.fonte === 'extra') dExtra += p.v;
      });

      const lim = dados.config?.limite || 0;
      
      // Update Cards
      document.getElementById('r-extra').innerText = fmt(bExtra - dExtra);
      document.getElementById('f-extra').style.width = Math.min((dExtra/(bExtra||1))*100, 100) + "%";
      document.getElementById('f-extra').style.background = getCor((dExtra/(bExtra||1))*100);

      document.getElementById('r-salario').innerText = fmt(bSalario - dSalario);
      document.getElementById('f-salario').style.width = Math.min((dSalario/(bSalario||1))*100, 100) + "%";
      document.getElementById('f-salario').style.background = getCor((dSalario/(bSalario||1))*100);

      document.getElementById('r-adiant').innerText = fmt(bAdiant - dAdiant);
      document.getElementById('f-adiant').style.width = Math.min((dAdiant/(bAdiant||1))*100, 100) + "%";
      document.getElementById('f-adiant').style.background = getCor((dAdiant/(bAdiant||1))*100);

      // Card Cartão Tamanho Normal
      document.getElementById('c-total-val').innerText = fmt(lim);
      document.getElementById('c-uso-val').innerText = fmt(fatura);
      document.getElementById('c-disp-val').innerText = fmt(lim - fatura);
      document.getElementById('f-cartao').style.width = Math.min((fatura/(lim||1))*100, 100) + "%";
      document.getElementById('f-cartao').style.background = getCor((fatura/(lim||1))*100);

      desenharListas(d);
      atualizarGrafico(totalRenda, totalDespesa);
    }

    function desenharListas(d) {
      const lRec = document.getElementById('l-receitas'); lRec.innerHTML = "";
      [...d.r_fixas, ...d.r_extras].forEach((item) => {
        lRec.innerHTML += `<div class="linha-item"><div style="flex:1"><b>${item.d}</b></div><span>${fmt(item.v)}</span></div>`;
      });
      const lContas = document.getElementById('l-contas'); lContas.innerHTML = "";
      d.contas.forEach((c, i) => {
        lContas.innerHTML += `<div class="linha-item"><div class="check-pg ${c.pago?'pago':''}" onclick="tentarPagar(${i})"></div><div style="flex:1"><b>${c.d}</b><br><small>${c.data}</small></div><span>${fmt(c.v)}</span><button onclick="excluir('contas', ${i})" style="border:none; background:none; color:var(--red); padding:10px;">X</button></div>`;
      });
      const lPgs = document.getElementById('l-pgs'); lPgs.innerHTML = "";
      d.pgs.forEach((p, i) => {
          lPgs.innerHTML += `<div class="linha-item"><div style="flex:1"><b>${p.d}</b></div><span>${fmt(p.v)}</span><button onclick="excluir('pgs', ${i})" style="border:none; background:none; color:var(--red); padding:10px;">X</button></div>`;
      });
    }

    function abrirModal(t) {
      pendente = { tipo: t };
      document.getElementById('in-valor').value = "";
      document.getElementById('in-data').value = new Date().toISOString().split('T')[0];
      const divDesc = document.getElementById('div-desc');
      if(t === 'pgs') { divDesc.style.display = 'none'; pendente.d = "Antecipação da Fatura"; }
      else { divDesc.style.display = 'block'; document.getElementById('in-desc').value = ""; }
      document.getElementById('modal-input').style.display = 'flex';
    }

    function salvarNovo() {
      const v = parseFloat(document.getElementById('in-valor').value), dt = document.getElementById('in-data').value;
      const d = pendente.tipo === 'pgs' ? pendente.d : document.getElementById('in-desc').value;
      if(!v || !d) return alert("Preencha os campos");
      const mes = document.getElementById("mes_select").value;
      if(pendente.tipo === 'pgs') {
          pendente.v = v; pendente.data = dt;
          document.getElementById('modal-input').style.display = 'none';
          document.getElementById('btn-pg-credito').style.display = 'none';
          document.getElementById('modal-pagar').style.display = 'flex';
      } else {
          dados[mes][pendente.tipo].push({ d, v, data: dt, pago: false });
          fecharModais(); save();
      }
    }

    function tentarPagar(index) {
      const mes = document.getElementById("mes_select").value;
      const conta = dados[mes].contas[index];
      if(conta.pago) return;
      pendente = { tipo: 'contas', index: index, v: conta.v, d: conta.d, data: conta.data };
      document.getElementById('pg-info').innerText = `${conta.d} - ${fmt(conta.v)}`;
      document.getElementById('btn-pg-credito').style.display = 'block';
      document.getElementById('modal-pagar').style.display = 'flex';
    }

    function processarPagamento(fonte) {
      const mes = document.getElementById("mes_select").value;
      if(pendente.tipo === 'contas') {
          dados[mes].contas[pendente.index].pago = true;
          dados[mes].contas[pendente.index].fonte = fonte;
      } else {
          dados[mes].pgs.push({ d: pendente.d, v: pendente.v, data: pendente.data, fonte: fonte });
      }
      fecharModais(); save();
    }

    function fecharModais() { document.querySelectorAll('.modal').forEach(m=>m.style.display='none'); }
    function excluir(t, i) { if(confirm("Excluir?")) { dados[document.getElementById("mes_select").value][t].splice(i,1); save(); } }

    function popMeses() {
      const s = document.getElementById("mes_select"); if(s.options.length>0) return;
      ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"].forEach((m,i)=>{
        let o = document.createElement("option"); o.value=`2026-${String(i+1).padStart(2,'0')}`; o.innerText=m;
        if(i===new Date().getMonth()) o.selected=true; s.appendChild(o);
      });
    }

    function mudarTab(e, n) {
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
      document.getElementById('aba-'+n).classList.add('active'); e.target.classList.add('active');
    }

    function atualizarGrafico(renda, despesa) {
      const ctx = document.getElementById('meuGrafico').getContext('2d');
      if(chartInstancia) chartInstancia.destroy();
      chartInstancia = new Chart(ctx, {
        type: 'doughnut',
        data: { labels: ['Renda Total', 'Gasto Total'], datasets: [{ data: [renda, despesa], backgroundColor: ['#107c10', '#d13438'], borderWidth: 0 }] },
        options: { plugins: { legend: { position: 'bottom', labels: { color: '#fff', font: { size: 12 } } } } }
      });
    }
  </script>
</body>
</html>
