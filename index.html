<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>MS Finanças</title>
  
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <style>
    :root { --blue: #0078d4; --green: #107c10; --yellow: #ffb900; --orange: #d83b01; --red: #d13438; --bg: #1c1c1c; --card-bg: #2b2b2b; --border: #3c3c3c; }
    * { box-sizing: border-box; font-family: "Segoe UI", sans-serif; }
    body { margin: 0; background: var(--bg); color: #fff; overflow-x: hidden; }
    
    /* Telas controladas apenas por CSS para evitar loop de refresh */
    #tela-login { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 5000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    #app-content { display: none; padding: 15px; max-width: 800px; margin: 0 auto; padding-bottom: 100px; }
    
    .login-box { background: var(--card-bg); padding: 30px; border-radius: 20px; width: 100%; max-width: 350px; border: 1px solid var(--blue); text-align: center; }
    .login-box input { width: 100%; padding: 12px; margin: 8px 0; background: #1a1a1a; border: 1px solid var(--border); color: white; border-radius: 8px; }
    .cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .card { padding: 12px; border-radius: 12px; background: var(--card-bg); border: 1px solid var(--border); position: relative; overflow: hidden; height: 90px; }
    .barra-bg { position: absolute; bottom: 0; left: 0; width: 100%; height: 5px; background: #333; }
    .barra-fill { height: 100%; width: 0%; transition: width 0.6s; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; align-items: center; justify-content: center; }
    .modal-content { background: var(--card-bg); border: 1px solid var(--blue); padding: 25px; border-radius: 20px; width: 90%; max-width: 320px; }
    .btn-action { width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: 800; color: white; margin-top: 10px; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
  </style>
</head>
<body>

  <div id="tela-login">
    <div class="login-box">
      <h2 style="color:var(--blue)">MS FINANÇAS</h2>
      <input type="email" id="login-email" placeholder="E-mail">
      <input type="password" id="login-senha" placeholder="Senha">
      <button class="btn-action" style="background:var(--blue)" onclick="autenticar()">ENTRAR</button>
    </div>
  </div>

  <div id="app-content">
    <header style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <span style="color:var(--blue); font-weight:800;">MS FINANÇAS</span>
      <button onclick="deslogar()" style="background:none; border:none; color:var(--red); font-weight:bold;">SAIR</button>
    </header>
    <select id="mes_select" onchange="renderizar();" style="background:#1a1a1a; color:white; padding:10px; width:100%; border-radius:8px; margin-bottom:15px;"></select>
    
    <div class="cards-grid">
      <div class="card"><h2>💎 Extra</h2><p id="res-extra">R$ 0,00</p><div class="barra-bg"><div id="bar-extra" class="barra-fill"></div></div></div>
      <div class="card"><h2>📅 Adiant.</h2><p id="res-adiant">R$ 0,00</p><div class="barra-bg"><div id="bar-adiant" class="barra-fill"></div></div></div>
      <div class="card"><h2>💰 Salário</h2><p id="res-salario">R$ 0,00</p><div class="barra-bg"><div id="bar-salario" class="barra-fill"></div></div></div>
      <div class="card"><h2>💳 Cartão</h2><p id="res-cartao">R$ 0,00</p><div class="barra-bg"><div id="bar-cartao" class="barra-fill"></div></div></div>
    </div>

    <div style="margin-top:20px">
        <button onclick="addItem('fixas')" class="btn-action" style="background:var(--blue)">+ Adicionar Conta</button>
        <div id="lista-fixas"></div>
    </div>
  </div>

  <script>
    const firebaseConfig = { apiKey: "AIzaSyBXOEwaB-i7hNRe_ezn1mW9G8p7bL6v8K0", authDomain: "ms-financas.firebaseapp.com", projectId: "ms-financas", storageBucket: "ms-financas.firebasestorage.app", messagingSenderId: "825396392769", appId: "1:825396392769:web:0a67fd59dc6bd18391e7c0" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // AQUI ESTÁ O SEGREDO: SEM REDIRECIONAMENTO (window.location)
    auth.onAuthStateChanged(user => {
      if (user) {
        document.getElementById('tela-login').style.display = 'none';
        document.getElementById('app-content').style.display = 'block';
        carregarDados(user.uid);
      } else {
        document.getElementById('app-content').style.display = 'none';
        document.getElementById('tela-login').style.display = 'flex';
      }
    });

    async function autenticar() {
      const e = document.getElementById('login-email').value;
      const s = document.getElementById('login-senha').value;
      await auth.signInWithEmailAndPassword(e, s).catch(err => alert("Erro"));
    }

    async function deslogar() {
      await auth.signOut();
    }

    async function carregarDados(uid) {
      const doc = await db.collection("usuarios").doc(uid).get();
      const dados = doc.exists ? doc.data() : { config: { limite: 2000 } };
      popularMeses();
      // Renderização simplificada para teste de loop
      document.getElementById('res-extra').innerText = "Conectado!";
    }

    function popularMeses() {
      const s = document.getElementById("mes_select");
      if(s.options.length > 0) return;
      const ms = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
      ms.forEach((m, i) => {
        let o = document.createElement("option"); o.value = `2026-${String(i+1).padStart(2,'0')}`; o.textContent = m;
        if(i+1 === new Date().getMonth()+1) o.selected = true; s.appendChild(o);
      });
    }
  </script>
</body>
</html>
