<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>MS Finanças v6.4.4</title>
  
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root { 
      --blue: #00a2ff; --green: #2ecc71; --yellow: #f1c40f; 
      --orange: #e67e22; --red: #e74c3c; --bg: #0f172a; 
      --card-bg: rgba(30, 41, 59, 0.7); --border: rgba(255, 255, 255, 0.1); 
    }
    
    * { box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
    
    body { 
      margin: 0; background: radial-gradient(circle at top right, #1e293b, #0f172a); 
      color: #f8fafc; min-height: 100vh; padding-bottom: 60px;
    }
    
    input, select { 
      width: 100%; padding: 18px; margin-bottom: 15px; border-radius: 16px; 
      background: rgba(15, 23, 42, 0.8); color: #fff; border: 1px solid var(--border); 
      font-size: 1.1rem;
    }

    .btn-action { 
      width: 100%; padding: 18px; border: none; border-radius: 18px; 
      font-weight: 700; color: white; cursor: pointer; margin-top: 10px; 
      font-size: 1rem; text-transform: uppercase; letter-spacing: 1px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: transform 0.1s;
    }
    .btn-action:active { transform: scale(0.98); }

    /* Botão Sair */
    .btn-sair {
      background: rgba(231, 76, 60, 0.2); color: var(--red); border: 1px solid var(--red);
      padding: 8px 15px; border-radius: 12px; font-weight: 700; cursor: pointer;
      font-size: 0.8rem; transition: 0.3s;
    }
    .btn-sair:hover { background: var(--red); color: white; }
    
    #app-content { display: none; padding: 15px; max-width: 900px; margin: 0 auto; }

    .header-app { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }

    .tab-bar { 
      display: flex; background: var(--card-bg); backdrop-filter: blur(10px);
      border-radius: 20px; padding: 6px; margin-bottom: 25px; border: 1px solid var(--border); 
    }
    .tab-btn { 
      flex: 1; padding: 15px 5px; border: none; background: transparent; 
      color: #94a3b8; font-weight: 600; border-radius: 14px; font-size: 0.75rem;
    }
    .tab-btn.active { background: var(--blue); color: #fff; }
    
    .cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .card { 
      padding: 15px; border-radius: 22px; background: var(--card-bg); 
      border: 1px solid var(--border); height: 150px; display: flex; 
      flex-direction: column; justify-content: center; position: relative; 
      overflow: hidden; backdrop-filter: blur(5px);
    }
    .card h2 { margin: 0 0 8px 0; font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; }
    .card p { margin: 0; font-size: 1.1rem; font-weight: 800; color: #fff; }
    
    .label-uso-destaque { color: var(--red) !important; font-weight: 800; }
    .label-disp-destaque { color: var(--green) !important; font-weight: 800; }

    .barra-progresso { position: absolute; bottom: 0; left: 0; width: 100%; height: 6px; background: rgba(255,255,255,0.05); }
    .fill { height: 100%; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }

    .secao { 
      background: var(--card-bg); padding: 20px; border-radius: 24px; 
      margin-bottom: 20px; border: 1px solid var(--border); 
    }
    .secao h3 { margin-top: 0; font-size: 1.1rem; color: var(--blue); border-bottom: 1px solid var(--border); padding-bottom: 10px; }

    .linha-item { 
      display: flex; align-items: center; padding: 15px 0; 
      border-bottom: 1px solid rgba(255,255,255,0.05); gap: 12px; 
    }
    
    .check-pg { 
      width: 38px; height: 38px; border: 2px solid #475569; border-radius: 12px; 
      display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0;
    }
    .check-pg.pago { background: var(--green); border-color: var(--green); }
    .check-pg.pago::after { content: '✓'; color: white; font-weight: 900; }

    .chart-container { width: 100%; max-width: 220px; margin: 15px auto; height: 220px; }

    .modal { 
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); 
      backdrop-filter: blur(8px); z-index: 10000; align-items: center; justify-content: center; padding: 20px; 
    }
    .modal-content { background: #1e293b; border: 1px solid var(--blue); padding: 25px; border-radius: 28px; width: 100%; max-width: 400px; }
    
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .badge-atraso { color: var(--red); font-size: 0.7rem; font-weight: bold; text-transform: uppercase; margin-left: 5px; }
  </style>
</head>
<body>

  <div id="tela-login" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px;">
    <div id="box-login" style="background: var(--card-bg); padding: 40px; border-radius: 30px; width: 100%; max-width: 380px; border: 1px solid var(--blue); text-align: center;">
      <h1 style="color:#fff; margin-bottom:10px; font-size: 1.8rem;">MS FINANÇAS</h1>
      <input type="email" id="l-email" placeholder="E-mail">
      <input type="password" id="l-pass" placeholder="Senha">
      <button class="btn-action" style="background:var(--blue)" onclick="autenticar('login')">Entrar</button>
    </div>
  </div>

  <div id="app-content">
    <header class="header-app">
      <select id="mes_select" onchange="renderizar();" style="margin-bottom: 0; flex: 1;"></select>
      <button class="btn-sair" onclick="auth.signOut()">Sair</button>
    </header>

    <nav class="tab-bar">
      <button class="tab-btn active" onclick="mudarTab(event, 'resumo')">RESUMO</button>
      <button class="tab-btn" onclick="mudarTab(event, 'receitas')">RENDAS</button>
      <button class="tab-btn" onclick="mudarTab(event, 'despesas')">CONTAS</button>
      <button class="tab-btn" onclick="mudarTab(event, 'cartao')">CARTÃO</button>
    </nav>

    <main id="aba-resumo" class="tab-content active">
      <div class="cards-grid">
        <div class="card">
            <h2>💎 Renda Extra</h2>
            <p id="r-extra">R$ 0,00</p>
            <div class="barra-progresso"><div id="f-extra" class="fill"></div></div>
        </div>
        <div class="card">
            <h2>💰 Salário (01-15)</h2>
            <p id="r-salario">R$ 0,00</p>
            <div class="barra-progresso"><div id="f-salario" class="fill"></div></div>
        </div>
        <div class="card">
            <h2>📅 Adiantam. (16-31)</h2>
            <p id="r-adiant">R$ 0,00</p>
            <div class="barra-progresso"><div id="f-adiant" class="fill"></div></div>
        </div>
        <div class="card">
            <h2>💳 Crédito</h2>
            <p style="font-size: 0.9rem; color:#94a3b8">Uso: <span id="c-uso-val" class="label-uso-destaque">R$ 0</span></p>
            <p style="font-size: 0.9rem; color:#94a3b8">Disp: <span id="c-disp-val" class="label-disp-destaque">R$ 0</span></p>
            <div class="barra-progresso"><div id="f-cartao" class="fill"></div></div>
        </div>
      </div>
      <div class="chart-container"><canvas id="meuGrafico"></canvas></div>
    </main>

    <main id="aba-receitas" class="tab-content">
      <div class="secao">
        <h3>Recebimentos</h3>
        <div id="l-receitas"></div>
        <button onclick="abrirModal('r_fixas')" class="btn-action" style="background:var(--blue)">+ Salário / Adiantamento</button>
        <button onclick="abrirModal('r_extras')" class="btn-action" style="background:var(--green)">+ Renda Extra</button>
      </div>
    </main>

    <main id="aba-despesas" class="tab-content">
      <div class="secao">
        <h3>Despesas Fixas</h3>
        <div id="l-contas-fixas"></div>
        <button onclick="abrirModal('contas_fixas')" class="btn-action" style="background:var(--orange)">+ Nova Despesa Fixa</button>
      </div>
      <div class="secao">
        <h3>Despesas Variáveis</h3>
        <div id="l-contas-variaveis"></div>
        <button onclick="abrirModal('contas_variaveis')" class="btn-action" style="background:var(--yellow); color:#000">+ Nova Despesa Variável</button>
      </div>
    </main>

    <main id="aba-cartao" class="tab-content">
      <div class="secao">
        <label>Limite Cartão:</label>
        <input type="number" id="c-limite" onchange="salvarLimite(this.value)">
        <h3>Antecipações</h3>
        <div id="l-pgs"></div>
        <button onclick="abrirModal('pgs')" class="btn-action" style="background:var(--blue)">+ Antecipar Fatura</button>
      </div>
    </main>
  </div>

  <div id="modal-input" class="modal"><div class="modal-content">
    <h3 id="input-titulo" style="margin-top:0; color:#fff">Novo Registro</h3>
    <div id="div-desc"><input type="text" id="in-desc" placeholder="Descrição"></div>
    <input type="number" id="in-valor" placeholder="Valor R$">
    <div id="div-data"><input type="date" id="in-data"></div>
    <button class="btn-action" style="background:var(--blue)" onclick="salvarNovo()">Salvar</button>
    <button class="btn-action" style="background:#334155" onclick="fecharModais()">Cancelar</button>
  </div></div>

  <div id="modal-pagar" class="modal"><div class="modal-content">
    <h3 style="margin-top:0; color:#fff">Pagar Conta</h3>
    <p id="pg-info" style="color:#94a3b8; margin-bottom: 20px;"></p>
    <button class="btn-action" style="background:var(--blue)" onclick="processarPagamento('debito')">Débito (Salário/Ad.)</button>
    <button class="btn-action" style="background:var(--green)" onclick="processarPagamento('extra')">Renda Extra</button>
    <button id="btn-pg-credito" class="btn-action" style="background:var(--red)" onclick="processarPagamento('credito')">Cartão de Crédito</button>
    <button class="btn-action" style="background:#334155" onclick="fecharModais()">Voltar</button>
  </div></div>

  <script>
    const firebaseConfig = { apiKey: "AIzaSyBXOEwaB-i7hNRe_ezn1mW9G8p7bL6v8K0", authDomain: "ms-financas.firebaseapp.com", projectId: "ms-financas", storageBucket: "ms-financas.firebasestorage.app", messagingSenderId: "825396392769", appId: "1:825396392769:web:0a67fd59dc6bd18391e7c0" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.firestore();
    let dados = {}, uid = "", pendente = {}, chartInstancia = null;

    const fmt = v => Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
    
    const fmtDataBR = (dataISO) => {
        if(!dataISO) return "";
        const [ano, mes, dia] = dataISO.split('-');
        return `${dia}/${mes}/${ano}`;
    };

    auth.onAuthStateChanged(user => {
      document.getElementById('tela-login').style.display = user ? 'none' : 'flex';
      document.getElementById('app-content').style.display = user ? 'block' : 'none';
      if(user) { uid = user.uid; sync(); }
    });

    async function autenticar(m) {
      const e = document.getElementById('l-email').value, p = document.getElementById('l-pass').value;
      if(!e || !p) return;
      try { await auth.signInWithEmailAndPassword(e,p); } catch(err) { alert(err.message); }
    }

    async function sync() {
      popMeses();
      const doc = await db.collection("usuarios").doc(uid).get();
      dados = doc.exists ? doc.data() : { config: { limite: 0 } };
      document.getElementById('c-limite').value = dados.config?.limite || 0;
      renderizar();
    }

    async function save() { await db.collection("usuarios").doc(uid).set(dados); renderizar(); }
    function salvarLimite(v) { if(!dados.config) dados.config = {}; dados.config.limite = parseFloat(v) || 0; save(); }

    function getCor(percent) {
        if(percent < 60) return '#2ecc71';
        if(percent < 80) return '#e67e22';
        return '#e74c3c';
    }

    function renderizar() {
      const mes = document.getElementById("mes_select").value;
      if(!dados[mes]) dados[mes] = { r_fixas: [], r_extras: [], contas: [], pgs: [] };
      const d = dados[mes];

      let bSalario = d.r_fixas.filter(r => !r.d.toLowerCase().includes('adiant')).reduce((a,b)=>a+b.v,0);
      let bAdiant = d.r_fixas.filter(r => r.d.toLowerCase().includes('adiant')).reduce((a,b)=>a+b.v,0);
      let bExtra = d.r_extras.reduce((a,b)=>a+b.v,0);

      let dSalario = 0, dAdiant = 0, dExtra = 0, fatura = 0, totalGasto = 0;

      d.contas.forEach(c => {
        if(c.pago) {
            totalGasto += c.v;
            if(c.fonte === 'debito') {
                let dia = parseInt(c.data.split('-')[2]);
                if(dia <= 15) dSalario += c.v; else dAdiant += c.v;
            } else if(c.fonte === 'extra') dExtra += c.v;
            else if(c.fonte === 'credito') fatura += c.v;
        } else if(c.fonte === 'credito') { fatura += c.v; }
      });

      d.pgs.forEach(p => {
          fatura -= p.v;
          if(p.fonte === 'debito') {
              let dia = parseInt(p.data.split('-')[2]);
              if(dia <= 15) dSalario += p.v; else dAdiant += p.v;
          } else if(p.fonte === 'extra') dExtra += p.v;
      });

      const lim = dados.config?.limite || 0;
      
      document.getElementById('r-extra').innerText = fmt(bExtra - dExtra);
      document.getElementById('f-extra').style.width = Math.min((dExtra/(bExtra||1))*100, 100) + "%";
      document.getElementById('f-extra').style.background = getCor((dExtra/(bExtra||1))*100);

      document.getElementById('r-salario').innerText = fmt(bSalario - dSalario);
      document.getElementById('f-salario').style.width = Math.min((dSalario/(bSalario||1))*100, 100) + "%";
      document.getElementById('f-salario').style.background = getCor((dSalario/(bSalario||1))*100);

      document.getElementById('r-adiant').innerText = fmt(bAdiant - dAdiant);
      document.getElementById('f-adiant').style.width = Math.min((dAdiant/(bAdiant||1))*100, 100) + "%";
      document.getElementById('f-adiant').style.background = getCor((dAdiant/(bAdiant||1))*100);

      document.getElementById('c-uso-val').innerText = fmt(fatura);
      document.getElementById('c-disp-val').innerText = fmt(lim - fatura);
      document.getElementById('f-cartao').style.width = Math.min((fatura/(lim||1))*100, 100) + "%";
      document.getElementById('f-cartao').style.background = getCor((fatura/(lim||1))*100);

      desenharListas(d);
      atualizarGrafico(bSalario + bAdiant + bExtra, totalGasto);
    }

    function desenharListas(d) {
      const lRec = document.getElementById('l-receitas'); lRec.innerHTML = "";
      [...d.r_fixas, ...d.r_extras].forEach(item => {
        lRec.innerHTML += `<div class="linha-item"><div style="flex:1"><b style="color:#fff">${item.d}</b></div><span style="font-weight:700">${fmt(item.v)}</span></div>`;
      });

      const lFixas = document.getElementById('l-contas-fixas'), lVars = document.getElementById('l-contas-variaveis');
      lFixas.innerHTML = ""; lVars.innerHTML = "";
      const hoje = new Date().toISOString().split('T')[0];

      d.contas.forEach((c, i) => {
        const isVencida = !c.pago && c.data < hoje;
        const html = `
          <div class="linha-item">
            <div class="check-pg ${c.pago?'pago':''}" onclick="tentarPagar(${i})"></div>
            <div style="flex:1">
                <b style="color:#fff">${c.d}</b><br>
                <small style="color:#94a3b8">${fmtDataBR(c.data)}</small> 
                ${isVencida ? '<span class="badge-atraso">Atrasado</span>' : ''}
            </div>
            <span style="font-weight:700">${fmt(c.v)}</span>
            <button onclick="excluir('contas', ${i})" style="border:none; background:none; color:var(--red); font-weight:bold; padding:10px;">X</button>
          </div>`;
        if(c.tipo === 'fixa') lFixas.innerHTML += html; else lVars.innerHTML += html;
      });

      const lPgs = document.getElementById('l-pgs'); lPgs.innerHTML = "";
      d.pgs.forEach((p, i) => {
          lPgs.innerHTML += `<div class="linha-item"><div style="flex:1"><b style="color:#fff">${p.d}</b></div><span style="font-weight:700">${fmt(p.v)}</span><button onclick="excluir('pgs', ${i})" style="border:none; background:none; color:var(--red); font-weight:bold; padding:10px;">X</button></div>`;
      });
    }

    function abrirModal(t) {
      pendente = { tipo: t };
      document.getElementById('in-valor').value = "";
      const dD = document.getElementById('div-desc'), dDt = document.getElementById('div-data');
      document.getElementById('in-data').value = new Date().toISOString().split('T')[0];
      
      if(t === 'pgs') { dD.style.display = 'none'; dDt.style.display = 'none'; pendente.d = "Antecipação Fatura"; }
      else if(t === 'contas_variaveis') { dD.style.display = 'block'; dDt.style.display = 'none'; document.getElementById('in-desc').value = ""; }
      else { dD.style.display = 'block'; dDt.style.display = 'block'; document.getElementById('in-desc').value = ""; }
      document.getElementById('modal-input').style.display = 'flex';
    }

    function salvarNovo() {
      const v = parseFloat(document.getElementById('in-valor').value), dt = document.getElementById('in-data').value;
      const dStr = document.getElementById('in-desc').value;
      const mes = document.getElementById("mes_select").value;
      if(pendente.tipo === 'pgs') {
          pendente.v = v; pendente.data = dt;
          document.getElementById('modal-input').style.display = 'none';
          document.getElementById('btn-pg-credito').style.display = 'none';
          document.getElementById('modal-pagar').style.display = 'flex';
          return;
      }
      if(!v || (pendente.tipo !== 'pgs' && !dStr)) return;
      if(pendente.tipo === 'contas_fixas') dados[mes].contas.push({ d: dStr, v, data: dt, pago: false, tipo: 'fixa' });
      else if(pendente.tipo === 'contas_variaveis') dados[mes].contas.push({ d: dStr, v, data: dt, pago: false, tipo: 'variavel' });
      else dados[mes][pendente.tipo].push({ d: dStr, v, data: dt, pago: false });
      fecharModais(); save();
    }

    function tentarPagar(idx) {
      const m = document.getElementById("mes_select").value, c = dados[m].contas[idx];
      if(c.pago) return;
      pendente = { tipo: 'contas', index: idx, v: c.v, d: c.d, data: c.data };
      document.getElementById('pg-info').innerText = `${c.d} - ${fmt(c.v)}`;
      document.getElementById('btn-pg-credito').style.display = 'block';
      document.getElementById('modal-pagar').style.display = 'flex';
    }

    function processarPagamento(f) {
      const m = document.getElementById("mes_select").value;
      if(pendente.tipo === 'contas') { dados[m].contas[pendente.index].pago = true; dados[m].contas[pendente.index].fonte = f; }
      else { dados[m].pgs.push({ d: pendente.d, v: pendente.v, data: pendente.data, fonte: f }); }
      fecharModais(); save();
    }

    function fecharModais() { document.querySelectorAll('.modal').forEach(m=>m.style.display='none'); }
    function excluir(t, i) { if(confirm("Excluir?")) { dados[document.getElementById("mes_select").value][t].splice(i,1); save(); } }

    function popMeses() {
      const s = document.getElementById("mes_select"); if(s.options.length>0) return;
      ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"].forEach((m,i)=>{
        let o = document.createElement("option"); o.value=`2026-${String(i+1).padStart(2,'0')}`; o.innerText=m;
        if(i===new Date().getMonth()) o.selected=true; s.appendChild(o);
      });
    }

    function mudarTab(e, n) {
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
      document.getElementById('aba-'+n).classList.add('active'); e.target.classList.add('active');
    }

    function atualizarGrafico(r, g) {
      const ctx = document.getElementById('meuGrafico').getContext('2d');
      if(chartInstancia) chartInstancia.destroy();
      chartInstancia = new Chart(ctx, {
        type: 'doughnut',
        data: { labels: ['Renda', 'Gasto'], datasets: [{ data: [r, g], backgroundColor: ['#2ecc71', '#e74c3c'], borderWidth: 0 }] },
        options: { cutout: '75%', plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8', font: { size: 12 } } } }, maintainAspectRatio: false }
      });
    }
  </script>
</body>
</html>
