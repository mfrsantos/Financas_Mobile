<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>MS Finanças v6.3.3</title>
  
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#2c3e50">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="icon" type="image/png" href="./icon-192x192.png">
  
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

  <style>
    :root { --blue: #0078d4; --green: #107c10; --yellow: #ffb900; --orange: #d83b01; --red: #d13438; --bg: #1c1c1c; --card-bg: #2b2b2b; --border: #3c3c3c; }
    * { box-sizing: border-box; font-family: "Segoe UI", sans-serif; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; background: var(--bg); color: #fff; overflow-x: hidden; padding-bottom: 30px; }
    
    .logo-container { display: flex; align-items: center; gap: 10px; }
    .app-logo { width: 35px; height: 35px; border-radius: 8px; }

    .alerta-vencido { color: var(--red) !important; font-weight: 800; }
    .alerta-hoje { color: var(--yellow) !important; font-weight: 800; }
    .badge-aviso { background: var(--orange); color: white; padding: 12px; border-radius: 12px; margin: 10px; font-size: 0.85rem; text-align: center; display: none; font-weight: bold; }

    .modal-content input, .modal-content select { width: 100%; padding: 18px; margin-bottom: 15px; background: #1a1a1a; border: 1px solid var(--border); color: white; border-radius: 12px; font-size: 1.1rem; }
    .modal-btn { width: 100%; padding: 18px; margin: 8px 0; border: none; border-radius: 12px; color: white; font-weight: bold; font-size: 1rem; cursor: pointer; }
    
    #app-content { display: none; padding: 10px; max-width: 800px; margin: 0 auto; }
    .tab-bar { display: flex; background: #252525; border-radius: 12px; padding: 4px; margin-bottom: 15px; border: 1px solid var(--border); }
    .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; color: #a1a1a1; font-weight: 700; border-radius: 8px; font-size: 0.65rem; }
    .tab-btn.active { background: #323232; color: var(--blue); }
    
    .cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .card { padding: 12px; border-radius: 12px; background: var(--card-bg); border: 1px solid var(--border); position: relative; overflow: hidden; height: 110px; display: flex; flex-direction: column; justify-content: center; }
    .card h2 { margin: 0; font-size: 0.6rem; color: #b0b0b0; text-transform: uppercase; margin-bottom: 5px; }
    .card p { margin: 0; font-size: 1.05rem; font-weight: 800; }
    .barra-bg { position: absolute; bottom: 0; left: 0; width: 100%; height: 6px; background: #333; }
    .barra-fill { height: 100%; width: 0%; transition: width 0.8s ease; }
    
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
    .modal-content { background: var(--card-bg); border: 2px solid var(--blue); padding: 30px; border-radius: 25px; width: 95%; max-width: 380px; }
    
    .secao { background: var(--card-bg); padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid var(--border); }
    .linha-item { display: flex; align-items: center; padding: 14px 0; border-bottom: 1px solid #383838; gap: 10px; font-size: 0.9rem; }
    .btn-action { width: 100%; padding: 18px; border: none; border-radius: 15px; font-weight: 800; color: white; cursor: pointer; margin-top: 10px; font-size: 1rem; }
    .btn-del { background: var(--red); border: none; color: white; border-radius: 10px; width: 35px; height: 35px; font-weight: bold; }
    .pago-texto { text-decoration: line-through; color: #666 !important; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    select#mes_select { background: #1a1a1a; color: white; border: 1px solid var(--border); padding: 15px; border-radius: 12px; width: 100%; font-size: 1rem; }
  </style>
</head>
<body>

  <div id="tela-login" style="position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px;">
    <div id="box-login" style="background: var(--card-bg); padding: 25px; border-radius: 20px; width: 100%; max-width: 320px; border: 1px solid var(--blue); text-align: center;">
      <img src="./icon-192x192.png" style="width: 70px; margin-bottom: 10px; border-radius: 12px;">
      <h2 style="color:var(--blue); margin-bottom:20px;">MS FINANÇAS</h2>
      <input type="email" id="l-email" placeholder="E-mail" style="width:100%; padding:15px; margin-bottom:10px; border-radius:10px; background:#111; color:#fff; border:1px solid #444;">
      <input type="password" id="l-pass" placeholder="Senha" style="width:100%; padding:15px; margin-bottom:15px; border-radius:10px; background:#111; color:#fff; border:1px solid #444;">
      <button class="btn-action" style="background:var(--blue)" onclick="autenticar('login')">ENTRAR</button>
      <p style="margin-top:20px; font-size:0.8rem; color:#888;">Novo por aqui?</p>
      <button onclick="alternarAuth('cadastro')" style="background:none; border:none; color:var(--blue); font-weight:bold; cursor:pointer;">CRIAR CONTA</button>
      <p id="msg-login" style="color:var(--red); font-size:0.8rem; margin-top:10px;"></p>
    </div>

    <div id="box-cadastro" style="background: var(--card-bg); padding: 25px; border-radius: 20px; width: 100%; max-width: 320px; border: 1px solid var(--green); text-align: center; display:none;">
      <h2 style="color:var(--green); margin-bottom:20px;">CADASTRO</h2>
      <input type="email" id="c-email" placeholder="Seu melhor e-mail" style="width:100%; padding:15px; margin-bottom:10px; border-radius:10px; background:#111; color:#fff; border:1px solid #444;">
      <input type="password" id="c-pass" placeholder="Crie uma senha" style="width:100%; padding:15px; margin-bottom:10px; border-radius:10px; background:#111; color:#fff; border:1px solid #444;">
      <input type="password" id="c-confpass" placeholder="Confirme a senha" style="width:100%; padding:15px; margin-bottom:15px; border-radius:10px; background:#111; color:#fff; border:1px solid #444;">
      <button class="btn-action" style="background:var(--green)" onclick="autenticar('cadastro')">CADASTRAR</button>
      <button onclick="alternarAuth('login')" style="background:none; border:none; color:#888; margin-top:15px; cursor:pointer;">Voltar ao Login</button>
      <p id="msg-cadastro" style="color:var(--red); font-size:0.8rem; margin-top:10px;"></p>
    </div>
  </div>

  <div id="app-content">
    <header style="display:flex; justify-content: space-between; align-items: center; margin: 10px;">
      <div class="logo-container">
        <img src="./icon-192x192.png" class="app-logo">
        <span style="color:var(--blue); font-weight:800; font-size:1.1rem;">MS FINANÇAS</span>
      </div>
      <button onclick="sair()" style="background:none; border:none; color:var(--red); font-weight:bold;">SAIR</button>
    </header>

    <select id="mes_select" onchange="renderizar();"></select>
    <div id="aviso-geral" class="badge-aviso"></div>

    <nav class="tab-bar">
      <button class="tab-btn active" onclick="tab(event, 'resumo')">RESUMO</button>
      <button class="tab-btn" onclick="tab(event, 'receitas')">RENDAS</button>
      <button class="tab-btn" onclick="tab(event, 'despesas')">CONTAS</button>
      <button class="tab-btn" onclick="tab(event, 'cartao')">CARTÃO</button>
      <button class="tab-btn" onclick="tab(event, 'relatorio')">PDF</button>
    </nav>

    <main id="aba-resumo" class="tab-content active">
      <div class="cards-grid">
        <div class="card"><h2>💎 Extra</h2><p id="r-extra">R$ 0,00</p><div class="barra-bg"><div id="b-extra" class="barra-fill" style="background:var(--green)"></div></div></div>
        <div class="card"><h2>📅 Adiantam.</h2><p id="r-adiant">R$ 0,00</p><div class="barra-bg"><div id="b-adiant" class="barra-fill" style="background:var(--blue)"></div></div></div>
        <div class="card"><h2>💰 Salário</h2><p id="r-salario">R$ 0,00</p><div class="barra-bg"><div id="b-salario" class="barra-fill" style="background:var(--yellow)"></div></div></div>
        <div class="card"><h2>💳 Cartão</h2><p id="r-cartao">R$ 0,00</p><div class="barra-bg"><div id="b-cartao" class="barra-fill" style="background:var(--red)"></div></div></div>
      </div>
      <center><canvas id="meuGrafico" style="max-width:250px; margin-top:20px;"></canvas></center>
    </main>

    <main id="aba-receitas" class="tab-content"><div class="secao"><div id="l-receitas"></div><button onclick="abrirInput('receitas')" class="btn-action" style="background:var(--green)">+ NOVA RENDA</button></div></main>
    <main id="aba-despesas" class="tab-content">
        <div class="secao"><h3>Fixas</h3><div id="l-fixas"></div><button onclick="abrirInput('fixas')" class="btn-action" style="background:var(--blue)">+ FIXA</button></div>
        <div class="secao"><h3>Variáveis</h3><div id="l-vars"></div><button onclick="abrirInput('vars')" class="btn-action" style="background:var(--yellow); color:#000">+ VARIÁVEL</button></div>
    </main>
    <main id="aba-cartao" class="tab-content">
        <div class="secao"><label>Limite:</label><input type="number" id="c-limite" onchange="dados.config.limite=parseFloat(this.value);save()"></div>
        <div id="l-pgs"></div><button onclick="abrirInput('pgs')" class="btn-action" style="background:var(--blue)">+ PAGAMENTO</button>
    </main>
    <main id="aba-relatorio" class="tab-content"><button class="btn-action" style="background:var(--orange)" onclick="gerarPDF()">BAIXAR PDF</button></main>
  </div>

  <div id="modal-input" class="modal"><div class="modal-content">
    <h3 id="input-titulo">Novo Registro</h3>
    <input type="text" id="in-desc" placeholder="Descrição">
    <input type="number" step="0.01" id="in-valor" placeholder="Valor">
    <div id="campo-vencimento" style="display:none;"><input type="date" id="in-data"></div>
    <button class="modal-btn" style="background:var(--blue)" onclick="confirmarInput()">SALVAR</button>
    <button class="modal-btn" style="background:#444" onclick="fecharModais()">FECHAR</button>
  </div></div>

  <div id="modal-fonte" class="modal"><div class="modal-content">
    <h3>Pagar com:</h3>
    <button class="modal-btn" style="background:var(--red)" onclick="setFonte('cartao')">CARTÃO</button>
    <button class="modal-btn" style="background:var(--blue)" onclick="setFonte('auto')">DÉBITO (SALÁRIO)</button>
    <button class="modal-btn" style="background:var(--green)" onclick="setFonte('extra')">EXTRA</button>
  </div></div>

  <script>
    const firebaseConfig = { apiKey: "AIzaSyBXOEwaB-i7hNRe_ezn1mW9G8p7bL6v8K0", authDomain: "ms-financas.firebaseapp.com", projectId: "ms-financas", storageBucket: "ms-financas.firebasestorage.app", messagingSenderId: "825396392769", appId: "1:825396392769:web:0a67fd59dc6bd18391e7c0" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.firestore();
    let dados = {}, uid = "", chartInstancia = null, pendente = {};

    const fmt = v => Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});

    auth.onAuthStateChanged(user => {
      document.getElementById('tela-login').style.display = user ? 'none' : 'flex';
      document.getElementById('app-content').style.display = user ? 'block' : 'none';
      if(user) { uid = user.uid; sync(); }
    });

    function alternarAuth(m) {
      document.getElementById('box-login').style.display = m==='login'?'block':'none';
      document.getElementById('box-cadastro').style.display = m==='cadastro'?'block':'none';
    }

    async function autenticar(m) {
      const e = document.getElementById(m==='login'?'l-email':'c-email').value;
      const p = document.getElementById(m==='login'?'l-pass':'c-pass').value;
      if(m==='cadastro' && p !== document.getElementById('c-confpass').value) return alert("Senhas não conferem!");
      try { m==='login' ? await auth.signInWithEmailAndPassword(e,p) : await auth.createUserWithEmailAndPassword(e,p); }
      catch(err) { alert(err.message); }
    }

    async function sync() {
      popMeses();
      const doc = await db.collection("usuarios").doc(uid).get();
      dados = doc.exists ? doc.data() : { config: { limite: 0 } };
      renderizar();
    }

    async function save() { await db.collection("usuarios").doc(uid).set(dados); renderizar(); }

    function renderizar() {
      const mes = document.getElementById("mes_select").value;
      if(!dados[mes]) dados[mes] = { receitas: [], fixas: [], vars: [], pgs: [] };
      const d = dados[mes];

      let totR = d.receitas.reduce((a,b)=>a+b.v,0);
      let totF = d.fixas.reduce((a,b)=>a+b.v,0);
      let totV = d.vars.reduce((a,b)=>a+b.v,0);
      let totP = d.pgs.reduce((a,b)=>a+b.v,0);

      document.getElementById('r-extra').innerText = fmt(totR);
      document.getElementById('r-salario').innerText = fmt(totF + totV);
      document.getElementById('r-cartao').innerText = fmt(totP);

      list('l-receitas', d.receitas, 'receitas');
      list('l-fixas', d.fixas, 'fixas');
      list('l-vars', d.vars, 'vars');
      list('l-pgs', d.pgs, 'pgs');
      
      atualizarGrafico(totR, totF, totV);
    }

    function list(id, arr, tipo) {
      const el = document.getElementById(id); el.innerHTML = "";
      arr.forEach((item, i) => {
        el.innerHTML += `<div class="linha-item">
          <span style="flex:1">${item.d}</span>
          <span>${fmt(item.v)}</span>
          <button class="btn-del" onclick="del('${tipo}',${i})">X</button>
        </div>`;
      });
    }

    function abrirInput(t) {
      pendente.tipo = t;
      document.getElementById('input-titulo').innerText = "Adicionar " + t;
      document.getElementById('campo-vencimento').style.display = (t==='fixas'||t==='vars') ? 'block' : 'none';
      document.getElementById('modal-input').style.display = 'flex';
    }

    function confirmarInput() {
      const mes = document.getElementById("mes_select").value;
      const v = parseFloat(document.getElementById('in-valor').value);
      const d = document.getElementById('in-desc').value;
      if(!v || !d) return alert("Preencha tudo");
      
      if(pendente.tipo === 'fixas' || pendente.tipo === 'vars') {
        pendente.v = v; pendente.d = d;
        document.getElementById('modal-input').style.display = 'none';
        document.getElementById('modal-fonte').style.display = 'flex';
      } else {
        dados[mes][pendente.tipo].push({ d, v });
        fecharModais(); save();
      }
    }

    function setFonte(f) {
      const mes = document.getElementById("mes_select").value;
      dados[mes][pendente.tipo].push({ d: pendente.d, v: pendente.v, fonte: f });
      fecharModais(); save();
    }

    function fecharModais() { document.querySelectorAll('.modal').forEach(m=>m.style.display='none'); }

    function del(t, i) { 
      const mes = document.getElementById("mes_select").value;
      if(confirm("Apagar?")) { dados[mes][t].splice(i,1); save(); } 
    }

    function sair() { auth.signOut(); }

    function popMeses() {
      const s = document.getElementById("mes_select"); if(s.options.length>0) return;
      ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"].forEach((m,i)=>{
        let o = document.createElement("option"); o.value=`2026-${String(i+1).padStart(2,'0')}`; o.innerText=m;
        if(i===new Date().getMonth()) o.selected=true; s.appendChild(o);
      });
    }

    function tab(e, n) {
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
      document.getElementById('aba-'+n).classList.add('active'); e.target.classList.add('active');
    }

    function atualizarGrafico(r, f, v) {
      const ctx = document.getElementById('meuGrafico').getContext('2d');
      if(chartInstancia) chartInstancia.destroy();
      chartInstancia = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: ['Renda', 'Fixas', 'Vars'],
          datasets: [{ data: [r, f, v], backgroundColor: ['#107c10', '#0078d4', '#ffb900'] }]
        },
        options: { plugins: { legend: { display: false } } }
      });
    }

    function gerarPDF() {
      const { jsPDF } = window.jspdf; const doc = new jsPDF();
      doc.text("Relatório Financeiro - MS Informática", 10, 10);
      doc.save("financeiro.pdf");
    }

    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js'); }
  </script>
</body>
</html>
