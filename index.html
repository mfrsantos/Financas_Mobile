<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>MS Finanças Cloud</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#0078d4">
  
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <style>
    :root { --blue: #0078d4; --green: #107c10; --yellow: #ffb900; --purple: #8764b8; --red: #d13438; --bg: #1c1c1c; --card-bg: #2b2b2b; --border: #3c3c3c; }
    * { box-sizing: border-box; font-family: "Segoe UI", sans-serif; touch-action: manipulation; }
    body { margin: 0; background: var(--bg); color: #fff; overflow-x: hidden; }
    
    /* Tela de Login */
    #tela-login { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    .login-box { background: var(--card-bg); padding: 30px; border-radius: 20px; width: 100%; max-width: 350px; border: 1px solid var(--blue); text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .login-box input { width: 100%; padding: 12px; margin: 10px 0; background: #1a1a1a; border: 1px solid var(--border); color: white; border-radius: 8px; font-size: 1rem; }
    .btn-login { width: 100%; padding: 14px; background: var(--blue); color: white; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; margin-top: 10px; transition: 0.3s; }
    .btn-login:active { transform: scale(0.98); opacity: 0.8; }

    /* App Content */
    #app-content { display: none; padding: 10px; max-width: 800px; margin: 0 auto; padding-bottom: 80px; }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .sync-status { font-size: 0.65rem; color: #aaa; background: #333; padding: 4px 8px; border-radius: 10px; }
    
    .tab-bar { display: flex; background: #252525; border-radius: 12px; padding: 4px; margin-bottom: 15px; border: 1px solid var(--border); }
    .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; color: #a1a1a1; font-weight: 700; border-radius: 8px; font-size: 0.75rem; }
    .tab-btn.active { background: #323232; color: var(--blue); }

    .cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .card { padding: 12px; border-radius: 12px; background: var(--card-bg); border: 1px solid var(--border); border-bottom: 3px solid var(--blue); }
    .card h2 { margin: 0; font-size: 0.6rem; color: #b0b0b0; text-transform: uppercase; }
    .card p { margin: 5px 0; font-size: 1rem; font-weight: 800; }
    .barra-box { width: 100%; height: 6px; background: #444; border-radius: 3px; margin-top: 8px; overflow: hidden; }
    .progresso { height: 100%; width: 0%; transition: width 0.6s ease; }

    .secao { background: var(--card-bg); padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid var(--border); }
    .linha-item { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #383838; gap: 10px; }
    .info-area { display: flex; flex: 1; justify-content: space-between; font-size: 0.85rem; }
    .btn-del { background: var(--red); color: white; border: none; border-radius: 6px; width: 30px; height: 30px; }
    
    select { background: #1a1a1a; color: white; border: 1px solid var(--border); padding: 10px; border-radius: 8px; width: 100%; margin-bottom: 15px; }
  </style>
</head>
<body>

  <div id="tela-login">
    <div class="login-box">
      <h2 style="color:var(--blue)">MS FINANÇAS CLOUD</h2>
      <input type="email" id="login-email" placeholder="E-mail">
      <input type="password" id="login-senha" placeholder="Senha">
      <button class="btn-login" onclick="autenticar()">ENTRAR / CADASTRAR</button>
      <p id="login-msg" style="font-size: 0.7rem; color: var(--red); margin-top: 10px;"></p>
    </div>
  </div>

  <div id="app-content">
    <header>
      <div style="display:flex; flex-direction:column">
        <span style="color:var(--blue); font-weight:800; font-size:0.9rem">MS INFORMÁTICA</span>
        <span id="status-cloud" class="sync-status">Sincronizado</span>
      </div>
      <button onclick="auth.signOut()" style="background:none; border:none; color:var(--red); font-weight:bold">Sair</button>
    </header>

    <select id="mes_select" onchange="renderizar();"></select>

    <nav class="tab-bar">
      <button class="tab-btn active" onclick="mudarAba('resumo')">RESUMO</button>
      <button class="tab-btn" onclick="mudarAba('receitas')">RECEITAS</button>
      <button class="tab-btn" onclick="mudarAba('despesas')">DESPESAS</button>
    </nav>

    <main id="aba-resumo" class="tab-content active">
      <div class="cards-grid">
        <div class="card" style="border-bottom-color: var(--purple);">
          <h2>Extra Livre</h2><p id="res-extra">R$ 0,00</p>
          <div class="barra-box"><div id="bar-extra" class="progresso"></div></div>
        </div>
        <div class="card" style="border-bottom-color: var(--blue);">
          <h2>Adiantamento</h2><p id="res-adiant">R$ 0,00</p>
          <div class="barra-box"><div id="bar-adiant" class="progresso"></div></div>
        </div>
        <div class="card" style="border-bottom-color: var(--green);">
          <h2>Salário</h2><p id="res-salario">R$ 0,00</p>
          <div class="barra-box"><div id="bar-salario" class="progresso"></div></div>
        </div>
        <div class="card" style="border-bottom-color: var(--red);">
          <h2>Cartão (Limite)</h2><p id="res-fatura">R$ 0,00</p>
          <div class="barra-box"><div id="bar-cartao" class="progresso"></div></div>
        </div>
      </div>
    </main>

    <main id="aba-receitas" class="tab-content">
        <div class="secao">
            <h3>Minhas Receitas</h3>
            <div id="lista-receitas"></div>
            <button onclick="addReceita()" class="btn-login" style="background:var(--green)">+ Nova Receita</button>
        </div>
    </main>

    <main id="aba-despesas" class="tab-content">
        <div class="secao">
            <h3>Contas Fixas</h3>
            <div id="lista-fixas"></div>
            <button onclick="addDespesaFixa()" class="btn-login" style="background:var(--purple)">+ Nova Conta</button>
        </div>
    </main>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBXOEwaB-i7hNRe_ezn1mW9G8p7bL6v8K0",
      authDomain: "ms-financas.firebaseapp.com",
      projectId: "ms-financas",
      storageBucket: "ms-financas.firebasestorage.app",
      messagingSenderId: "825396392769",
      appId: "1:825396392769:web:0a67fd59dc6bd18391e7c0"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    let dados = {};

    // Sincronização e Login
    async function autenticar() {
      const email = document.getElementById('login-email').value;
      const senha = document.getElementById('login-senha').value;
      const msg = document.getElementById('login-msg');
      try {
        await auth.signInWithEmailAndPassword(email, senha);
      } catch (e) {
        try { await auth.createUserWithEmailAndPassword(email, senha); } 
        catch (err) { msg.innerText = "Falha no Login/Cadastro"; }
      }
    }

    auth.onAuthStateChanged(user => {
      if (user) {
        document.getElementById('tela-login').style.display = 'none';
        document.getElementById('app-content').style.display = 'block';
        carregarDados(user.uid);
      } else {
        document.getElementById('tela-login').style.display = 'flex';
        document.getElementById('app-content').style.display = 'none';
      }
    });

    async function carregarDados(uid) {
      const doc = await db.collection("usuarios").doc(uid).get();
      dados = doc.exists ? doc.data() : inicializar();
      popularMeses();
      renderizar();
    }

    async function salvar() {
      const user = auth.currentUser;
      if (user) {
        document.getElementById('status-cloud').innerText = "Salvando...";
        await db.collection("usuarios").doc(user.uid).set(dados);
        document.getElementById('status-cloud').innerText = "Sincronizado";
        renderizar();
      }
    }

    function inicializar() {
      const base = { config: { limiteCartao: 2000.00 } };
      for (let m = 1; m <= 12; m++) {
        base[`2026-${String(m).padStart(2, '0')}`] = { receitas: [{desc: "Adiantamento", valor: 0}, {desc: "Salário", valor: 0}], fixas: [], variaveis: [], pagamentosFatura: [] };
      }
      return base;
    }

    function formatar(v) { return Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }

    function renderizar() {
      const mes = document.getElementById("mes_select").value || "2026-03";
      const info = dados[mes];
      if(!info) return;

      document.getElementById("lista-receitas").innerHTML = info.receitas.map((r, i) => `
        <div class="linha-item"><span class="info-area"><b>${r.desc}</b></span>
        <input type="number" step="0.01" style="width:85px; text-align:right" value="${r.valor}" onchange="dados['${mes}'].receitas[${i}].valor=parseFloat(this.value);salvar()">
        </div>`).join('');

      document.getElementById("lista-fixas").innerHTML = info.fixas.map((f, i) => `
        <div class="linha-item">
          <div class="info-area"><span>${f.categoria}</span><b>${formatar(f.valor)}</b></div>
          <button onclick="removerItem('fixas', ${i})" class="btn-del">×</button></div>`).join('');

      atualizarResumo(mes);
    }

    function atualizarResumo(mes) {
      const info = dados[mes];
      let vExtra=0, vAdiant=0, vSal=0, pExtra=0, pAdiant=0, pSal=0, gCartao=0;

      info.receitas.forEach(r => {
        const n = r.desc.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        if(n.includes("adiant")) vAdiant += r.valor; else if(n.includes("salario")) vSal += r.valor; else vExtra += r.valor;
      });

      info.fixas.forEach(f => { if(f.meio === 'extra') pExtra += f.valor; else pSal += f.valor; });

      document.getElementById("res-extra").innerText = formatar(vExtra - pExtra);
      document.getElementById("res-adiant").innerText = formatar(vAdiant - pAdiant);
      document.getElementById("res-salario").innerText = formatar(vSal - pSal);
      document.getElementById("res-fatura").innerText = formatar(dados.config.limiteCartao);

      pintarBarra("bar-extra", pExtra, vExtra);
      pintarBarra("bar-adiant", pAdiant, vAdiant);
      pintarBarra("bar-salario", pSal, vSal);
    }

    function pintarBarra(id, gasto, total) {
      const el = document.getElementById(id);
      const pct = total > 0 ? Math.min((gasto/total)*100, 100) : 0;
      el.style.width = pct + "%";
      el.style.backgroundColor = pct > 85 ? "var(--red)" : pct > 60 ? "var(--yellow)" : "var(--green)";
    }

    function popularMeses() {
      const s = document.getElementById("mes_select");
      if(s.options.length > 0) return;
      const ms = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
      ms.forEach((m, i) => {
        let o = document.createElement("option"); o.value = `2026-${String(i+1).padStart(2,'0')}`; o.textContent = m;
        if(i+1 === new Date().getMonth()+1) o.selected = true; s.appendChild(o);
      });
    }

    function mudarAba(aba) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      event.currentTarget.classList.add('active');
      document.getElementById(`aba-${aba}`).classList.add('active');
    }

    function addReceita() { const n = prompt("Nome:"); if(n){ const v = parseFloat(prompt("Valor:"))||0; dados[document.getElementById("mes_select").value].receitas.push({desc:n, valor:v}); salvar(); } }
    function addDespesaFixa() { const n = prompt("Conta:"); if(n){ const v = parseFloat(prompt("Valor:"))||0; dados[document.getElementById("mes_select").value].fixas.push({categoria:n, valor:v, meio:'debito'}); salvar(); } }
    function removerItem(t, i) { if(confirm("Remover?")){ dados[document.getElementById("mes_select").value][t].splice(i,1); salvar(); } }

    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js'); }
  </script>
</body>
</html>
